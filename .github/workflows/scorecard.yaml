name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "17 6 * * 2"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  analysis:
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    uses: NWarila/terraform-template/.github/workflows/reusable-scorecard.yaml@7ce84506f03cfff4904923724bed9e42804e7644

