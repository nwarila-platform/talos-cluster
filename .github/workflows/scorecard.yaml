name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "17 6 * * 2"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  analysis:
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    uses: NWarila/terraform-template/.github/workflows/reusable-scorecard.yaml@9d354ffd3e0609f99de9223462e43e66d6d934e2

