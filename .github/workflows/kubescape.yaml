# =============================================================================
# Kubescape — daily CIS K8s Benchmark compliance scan
#
# Implements the continuous-scanning leg of ADR-0009 §Confirmation §2.
# CLI mode (not the in-cluster operator) — queries the cluster via the
# Kubernetes API (no node-filesystem assumptions, fits Talos's deliberate
# file-layout departures).
#
# Output: SARIF uploaded to GitHub Code Scanning under category
# "kubescape-cis". Findings appear on the repo's Security tab; per-finding
# state (Open / Fixed / Dismissed) is tracked by Code Scanning, not by an
# in-repo baseline file.
# =============================================================================
name: Kubescape

on:
  # Daily runs revived 2026-07-12 per the P0.4 owner decision; target the existing in-cluster ARC scale set nwarila-talos-arc-ci.
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # required by aws-actions/configure-aws-credentials OIDC
  security-events: write   # required by github/codeql-action/upload-sarif

jobs:
  scan:
    name: CIS K8s scan
    runs-on: nwarila-talos-arc-ci
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install kubescape CLI (pinned, into RUNNER_TEMP; no sudo)
        run: |
          set -euo pipefail
          KS_VERSION="v4.0.8"
          KS_VER_NUM="4.0.8"
          KS_SHA256="3603bab7dab0da948967769db803843af70c11295f05d63beff4ecd7c91a9b20"
          url="https://github.com/kubescape/kubescape/releases/download/${KS_VERSION}/kubescape_${KS_VER_NUM}_linux_amd64"
          mkdir -p "${RUNNER_TEMP}/bin"
          curl --proto '=https' --tlsv1.2 -fsSL -o "${RUNNER_TEMP}/bin/kubescape" "${url}"
          echo "${KS_SHA256}  ${RUNNER_TEMP}/bin/kubescape" | sha256sum -c -
          chmod +x "${RUNNER_TEMP}/bin/kubescape"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
          "${RUNNER_TEMP}/bin/kubescape" version

      - name: Install Python 3.12 (pinned + checksum-verified, into RUNNER_TEMP; no sudo)
        run: |
          set -euo pipefail
          PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260623/cpython-3.12.13%2B20260623-x86_64-unknown-linux-gnu-install_only.tar.gz"
          PYTHON_SHA256="9fa869d69be54f6b8eeae64272fbd9bb0646e0e1a8da9d80e51ba5a3bee48930"
          archive="${RUNNER_TEMP}/cpython-3.12.13+20260623-x86_64-unknown-linux-gnu-install_only.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL -o "${archive}" "${PYTHON_URL}"
          echo "${PYTHON_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}" -C "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/python/bin" >> "$GITHUB_PATH"
          "${RUNNER_TEMP}/python/bin/python3" --version

      - name: Install AWS CLI v2 (pinned + checksum-verified, into RUNNER_TEMP; no sudo)
        run: |
          set -euo pipefail
          AWSCLI_URL="https://awscli.amazonaws.com/awscli-exe-linux-x86_64-2.35.21.zip"
          AWSCLI_SHA256="1fe665267a6149dfb8551cec52b419fa6e82533fab6dd7678939209246e792ee"
          zip="${RUNNER_TEMP}/awscliv2.zip"
          curl --proto '=https' --tlsv1.2 -fsSL -o "${zip}" "${AWSCLI_URL}"
          echo "${AWSCLI_SHA256}  ${zip}" | sha256sum -c -
          unzip -q "${zip}" -d "${RUNNER_TEMP}"
          mkdir -p "${RUNNER_TEMP}/bin"
          "${RUNNER_TEMP}/aws/install" --install-dir "${RUNNER_TEMP}/aws-cli" --bin-dir "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
          "${RUNNER_TEMP}/bin/aws" --version

      - name: Configure AWS credentials (kubeconfig pull only)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull kubeconfig from S3
        run: bash scripts/s3-sync.sh pull

      - name: Run kubescape scan (emit SARIF)
        id: scan
        # continue-on-error so the upload-sarif step still runs even if the
        # script exits non-zero — the SARIF itself is the signal we want.
        continue-on-error: true
        run: bash scripts/kubescape-scan.sh

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: kubescape.sarif
          category: kubescape-cis

      - name: Fail workflow if scan step errored
        if: steps.scan.outcome != 'success'
        run: |
          echo "kubescape-scan.sh exited non-zero; SARIF (if any) was uploaded above."
          exit 1
