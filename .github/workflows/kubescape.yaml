# =============================================================================
# Kubescape — daily CIS K8s Benchmark compliance scan
#
# Implements the continuous-scanning leg of ADR-0009 §Confirmation §2.
# CLI mode (not the in-cluster operator) — queries the cluster via the
# Kubernetes API (no node-filesystem assumptions, fits Talos's deliberate
# file-layout departures).
#
# Output: SARIF uploaded to GitHub Code Scanning under category
# "kubescape-cis". Findings appear on the repo's Security tab; per-finding
# state (Open / Fixed / Dismissed) is tracked by Code Scanning, not by an
# in-repo baseline file.
# =============================================================================
name: Kubescape

on:
  schedule:
    - cron: "0 4 * * *"  # daily 04:00 UTC (after etcd snapshot at 03:00, before workday)
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required by github/codeql-action/upload-sarif

jobs:
  scan:
    name: CIS K8s scan
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install kubescape CLI (pinned)
        run: |
          set -euo pipefail
          KS_VERSION="v4.0.8"
          KS_VER_NUM="4.0.8"
          url="https://github.com/kubescape/kubescape/releases/download/${KS_VERSION}/kubescape_${KS_VER_NUM}_linux_amd64"
          curl --proto '=https' --tlsv1.2 -fsSL -o kubescape "${url}"
          chmod +x kubescape
          sudo mv kubescape /usr/local/bin/kubescape
          kubescape version

      - name: Configure AWS credentials (kubeconfig pull only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull kubeconfig from S3
        run: bash scripts/s3-sync.sh pull

      - name: Run kubescape scan (emit SARIF)
        id: scan
        # continue-on-error so the upload-sarif step still runs even if the
        # script exits non-zero — the SARIF itself is the signal we want.
        continue-on-error: true
        run: bash scripts/kubescape-scan.sh

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: kubescape.sarif
          category: kubescape-cis

      - name: Fail workflow if scan step errored
        if: steps.scan.outcome != 'success'
        run: |
          echo "kubescape-scan.sh exited non-zero; SARIF (if any) was uploaded above."
          exit 1
