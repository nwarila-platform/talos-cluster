# =============================================================================
# Drift Detection — verify repo declarative state matches the live cluster.
#
# Runs scripts/drift-check.sh which regenerates machine configs from
# cluster/patches + secrets, pulls every node's live machineconfig, and
# structurally diffs the two. Also asserts kube-apiserver server gitVersion
# matches cluster/config.env KUBERNETES_VERSION.
#
# Implements ADR-0003 §Confirmation §3.
#
# Requires a self-hosted runner with network reach to the cluster VIP
# (10.69.112.62) — same posture as the Deploy workflow.
# =============================================================================
name: Drift Detection

on:
  # Scheduled runs disabled 2026-06-07: no self-hosted runners exist yet (a planned future cluster feature). Pre-wired for that future; runnable manually via workflow_dispatch once a runner is online. See PLAN section 7.
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # only used by the open-issue-on-failure step below

jobs:
  drift:
    name: Repo vs cluster
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install talosctl (pinned to cluster TALOS_VERSION)
        run: |
          set -euo pipefail
          TALOS_VERSION=$(grep '^TALOS_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${TALOS_VERSION}" ] || { echo "TALOS_VERSION missing from cluster/config.env"; exit 1; }
          url="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
          sums="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/sha256sum.txt"
          curl --proto '=https' --tlsv1.2 -fsSL -o talosctl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o sha256sum.txt "${sums}"
          expected=$(awk '$2=="talosctl-linux-amd64"{print $1}' sha256sum.txt)
          actual=$(sha256sum talosctl | awk '{print $1}')
          [ "${expected}" = "${actual}" ] || { echo "talosctl checksum mismatch"; exit 1; }
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/talosctl
          talosctl version --client --short

      - name: Install Python yaml dependency
        run: |
          python3 -m pip install --quiet pyyaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull secrets from S3
        run: bash scripts/s3-sync.sh pull

      - name: Drift check
        id: drift
        run: bash scripts/drift-check.sh | tee drift-output.txt

      - name: Open issue on drift
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('drift-output.txt', 'utf8'); }
            catch (e) { body = '(drift-output.txt not found)'; }
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift detected ${today}: repo vs live cluster`,
              labels: ['drift', 'automated'],
              body: '```\n' + body.slice(0, 60000) + '\n```',
            });
