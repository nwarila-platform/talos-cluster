# =============================================================================
# Sync Deploy Repositories
#
# Discovers nwarila-platform/deploy-* repositories that expose the standard
# Talos overlay and opens a PR with tenant-scoped Flux wiring.
# =============================================================================
name: Sync Deploy Repositories

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync deploy-* repos
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.DEPLOY_REPO_DISCOVERY_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          persist-credentials: false

      - name: Generate deploy repo manifests
        run: bash scripts/sync-deploy-repos.sh

      - name: Install kubectl
        run: |
          set -euo pipefail
          KUBERNETES_VERSION=$(grep '^KUBERNETES_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${KUBERNETES_VERSION}" ] || { echo "KUBERNETES_VERSION missing from cluster/config.env"; exit 1; }
          url="https://dl.k8s.io/release/${KUBERNETES_VERSION}/bin/linux/amd64/kubectl"
          sums="${url}.sha256"
          curl --proto '=https' --tlsv1.2 -fsSL -o kubectl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o kubectl.sha256 "${sums}"
          expected="$(cat kubectl.sha256)"
          actual="$(sha256sum kubectl | awk '{print $1}')"
          [ "${expected}" = "${actual}" ] || { echo "kubectl checksum mismatch: expected=${expected} actual=${actual}"; exit 1; }
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Validate rendered Kustomize tree
        run: kubectl kustomize clusters/talos-cluster >/dev/null

      - name: Open or update generated PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ github.token }}
          base: main
          branch: automation/deploy-repo-sync
          delete-branch: true
          sign-commits: true
          add-paths: |
            .gitignore
            clusters/talos-cluster/apps
            clusters/talos-cluster/tenants
          commit-message: |
            chore(deploy-repos): sync deploy repository wiring

            Regenerate tenant-scoped Flux wiring for deploy-* repositories that expose kubernetes/overlays/talos-cluster/kustomization.yaml.

            Verification: kubectl kustomize clusters/talos-cluster.
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: "chore(deploy-repos): sync deploy repository wiring"
          body: |
            ## Summary

            Regenerates tenant-scoped Flux wiring for deploy repositories matching
            the `deploy-*` contract.

            ## Contract

            - repository is under `nwarila-platform`
            - repository name matches `deploy-*`
            - repository exposes `kubernetes/overlays/talos-cluster/kustomization.yaml`

            ## Verification

            - `kubectl kustomize clusters/talos-cluster`

            After merge, Flux reconciles the generated GitRepository and
            Kustomization resources. Future workload/image changes happen in each
            `deploy-*` repository.
