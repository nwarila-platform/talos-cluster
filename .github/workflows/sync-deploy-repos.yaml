# =============================================================================
# Sync Deploy Repositories
#
# Discovers nwarila-platform/deploy-* repositories that expose the standard
# Talos overlay and opens a PR with tenant-scoped Flux wiring.
#
# Runs on the dedicated on-cluster repo-sync ARC runner. Mints ephemeral
# nwarila-repo-sync[bot] tokens from the SOPS/Flux-mounted App PEM (no static
# credential). See ADR-0016 + _handoff/PLAN.md §7.
# =============================================================================
name: Sync Deploy Repositories

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    name: Sync deploy-* repos
    runs-on: nwarila-repo-sync-arc-ci # the dedicated repo-sync scale set (runs-on == runnerScaleSetName)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Verify the mounted App key is present and PEM-shaped (no contents printed)
        run: |
          set -euo pipefail
          KEY=/opt/repo-sync/private-key.pem
          test -s "$KEY"
          grep -q "PRIVATE KEY" "$KEY"
          echo "repo-sync App key present and PEM-shaped"

      - name: Load PEM into a step output (newline-safe heredoc; not echoed)
        id: readkey
        run: |
          set -euo pipefail
          {
            echo "pem<<__PEM_EOF__"
            cat /opt/repo-sync/private-key.pem
            echo "__PEM_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Mint org-wide READ-ONLY token (deploy-* discovery)
        id: token_ro
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: "4080021" # nwarila-repo-sync (public identifier, not a secret)
          private-key: ${{ steps.readkey.outputs.pem }}
          owner: nwarila-platform # zizmor: ignore[github-app] org-wide read-only token is required for deploy-* discovery
          permission-contents: read
          permission-metadata: read

      - name: Mint talos-cluster WRITE token (open/update the PR)
        id: token_rw
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: "4080021"
          private-key: ${{ steps.readkey.outputs.pem }}
          owner: nwarila-platform
          repositories: talos-cluster # write confined to THIS repo only
          permission-contents: write
          permission-pull-requests: write

      - name: Install gh CLI (pinned + checksum-verified, into RUNNER_TEMP; no sudo)
        run: |
          set -euo pipefail
          GH_VERSION="2.95.0"
          base="https://github.com/cli/cli/releases/download/v${GH_VERSION}"
          tar="gh_${GH_VERSION}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL -o "${RUNNER_TEMP}/${tar}" "${base}/${tar}"
          curl --proto '=https' --tlsv1.2 -fsSL -o "${RUNNER_TEMP}/gh_checksums.txt" "${base}/gh_${GH_VERSION}_checksums.txt"
          ( cd "${RUNNER_TEMP}" && grep " ${tar}\$" gh_checksums.txt | sha256sum -c - )
          mkdir -p "${RUNNER_TEMP}/bin"
          tar -xzf "${RUNNER_TEMP}/${tar}" -C "${RUNNER_TEMP}"
          mv "${RUNNER_TEMP}/gh_${GH_VERSION}_linux_amd64/bin/gh" "${RUNNER_TEMP}/bin/gh"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
          "${RUNNER_TEMP}/bin/gh" --version

      - name: Generate deploy repo manifests
        env:
          GH_TOKEN: ${{ steps.token_ro.outputs.token }}
        run: bash scripts/sync-deploy-repos.sh

      - name: Open or update generated PR
        env:
          GH_TOKEN: ${{ steps.token_rw.outputs.token }}
        run: bash scripts/open-sync-pr.sh
