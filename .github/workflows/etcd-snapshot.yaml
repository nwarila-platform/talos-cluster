# =============================================================================
# etcd Snapshot — captures a Talos etcd snapshot and uploads it to S3 daily.
#
# Implements the scheduled-snapshot leg of ADR-0006. The actual snapshot
# logic lives in scripts/etcd-snapshot.sh. This workflow only handles
# scheduling, tool installation, and AWS credential plumbing.
#
# Requires a self-hosted runner with cluster VIP reachability (same
# posture as Deploy and Drift Detection).
# =============================================================================
name: etcd Snapshot

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC — off-peak for this cluster
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write   # only used by the open-issue-on-failure step

jobs:
  snapshot:
    name: Capture + upload
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install talosctl for Windows (pinned to cluster TALOS_VERSION)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $talosVersion = (Select-String -Path cluster/config.env -Pattern '^TALOS_VERSION="([^"]+)"').Matches[0].Groups[1].Value
          if (-not $talosVersion) {
            throw "TALOS_VERSION missing"
          }
          $artifact = "talosctl-windows-amd64.exe"
          $baseUrl = "https://github.com/siderolabs/talos/releases/download/$talosVersion"
          Invoke-WebRequest -Uri "$baseUrl/$artifact" -OutFile "talosctl.exe"
          Invoke-WebRequest -Uri "$baseUrl/sha256sum.txt" -OutFile "sha256sum.txt"
          $expected = $null
          foreach ($line in Get-Content -Path "sha256sum.txt") {
            if ($line -match "^\s*([a-fA-F0-9]+)\s+$([regex]::Escape($artifact))$") {
              $expected = $matches[1].ToLowerInvariant()
              break
            }
          }
          if (-not $expected) {
            throw "checksum entry for $artifact not found"
          }
          $actual = (Get-FileHash -Path "talosctl.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($expected -ne $actual) {
            throw "talosctl checksum mismatch: expected=$expected actual=$actual"
          }
          $toolDir = (Get-Location).Path
          $toolDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$toolDir;$env:PATH"
          $clientVersion = (& ".\talosctl.exe" version --client --short) -join "`n"
          Write-Output $clientVersion
          if ($clientVersion -notlike "*Talos $talosVersion*") {
            throw "talosctl version mismatch: expected $talosVersion"
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull secrets from S3 (talosconfig)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$PWD;$env:PATH"
          & "C:\Program Files\Git\bin\bash.exe" -lc 'set -euo pipefail; export PATH="$(pwd):$PATH"; bash scripts/s3-sync.sh pull'

      - name: Take + upload etcd snapshot
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $env:PATH = "$PWD;$env:PATH"
          & "C:\Program Files\Git\bin\bash.exe" -lc 'set -euo pipefail; export PATH="$(pwd):$PATH"; bash scripts/etcd-snapshot.sh | tee snapshot-output.txt'

      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('snapshot-output.txt', 'utf8'); }
            catch (e) { body = '(snapshot-output.txt not found)'; }
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `etcd snapshot failed ${today}`,
              labels: ['etcd-snapshot', 'automated'],
              body: '```\n' + body.slice(0, 60000) + '\n```',
            });
