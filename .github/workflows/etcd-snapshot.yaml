# =============================================================================
# etcd Snapshot - captures a Talos etcd snapshot and uploads it on demand.
#
# Implements the snapshot leg of ADR-0006. The actual snapshot
# logic lives in scripts/etcd-snapshot.sh. This workflow only handles
# manual execution, tool installation, and AWS credential plumbing.
#
# Requires a self-hosted runner with cluster VIP reachability. Scheduled use
# waits for the Stage-1 local backup server and future cluster runner.
# =============================================================================
name: etcd Snapshot

on:
  # Scheduled runs disabled 2026-06-07: etcd snapshots are moving to the
  # Stage-1 local backup server, not S3. Re-enable and retarget when that
  # server exists. See PLAN section 7 and ADR-0006.
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # only used by the open-issue-on-failure step

jobs:
  snapshot:
    name: Capture + upload
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install talosctl (pinned to cluster TALOS_VERSION)
        run: |
          set -euo pipefail
          TALOS_VERSION=$(grep '^TALOS_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${TALOS_VERSION}" ] || { echo "TALOS_VERSION missing"; exit 1; }
          url="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
          sums="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/sha256sum.txt"
          curl --proto '=https' --tlsv1.2 -fsSL -o talosctl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o sha256sum.txt "${sums}"
          expected=$(awk '$2=="talosctl-linux-amd64"{print $1}' sha256sum.txt)
          actual=$(sha256sum talosctl | awk '{print $1}')
          [ "${expected}" = "${actual}" ] || { echo "talosctl checksum mismatch"; exit 1; }
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/talosctl

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull secrets from S3 (talosconfig)
        run: bash scripts/s3-sync.sh pull

      - name: Take + upload etcd snapshot
        run: bash scripts/etcd-snapshot.sh | tee snapshot-output.txt

      - name: Open issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try { body = fs.readFileSync('snapshot-output.txt', 'utf8'); }
            catch (e) { body = '(snapshot-output.txt not found)'; }
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `etcd snapshot failed ${today}`,
              labels: ['etcd-snapshot', 'automated'],
              body: '```\n' + body.slice(0, 60000) + '\n```',
            });
