# =============================================================================
# Validate — runs on every PR touching cluster configs, addons, or scripts
# =============================================================================
name: Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "cluster/**"
      - "clusters/**"
      - "addons/**"
      - "docs/decision-records/**"
      - "docs/runbooks/**"
      - "scripts/**"
      - ".github/workflows/**"
      - "Makefile"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check tracked text encoding
        run: python scripts/check-text-encoding.py

      - name: Test read-only Talos drift checker
        run: |
          python scripts/test-talos-drift-readonly.py
          python scripts/render-talos-drift-expected.py --check

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint

      - name: ShellCheck
        run: shellcheck -S warning scripts/*.sh

      - name: YAML Lint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, truthy: {check-keys: false}, comments: {min-spaces-from-content: 1}}}' cluster/ addons/

  maintenance-iso:
    name: Maintenance ISO Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Validate maintenance ISO builder guard
        run: |
          bash -n scripts/build-maintenance-iso.sh
          bash scripts/build-maintenance-iso.sh --self-test

  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install talosctl (pinned to cluster TALOS_VERSION)
        run: |
          # Pin to the cluster's Talos version (cluster/config.env) instead of
          # piping the upstream installer to sh, which always fetches the
          # latest release. CI must validate against the same talosctl version
          # the cluster runs, and the asset + checksum must be auditable from
          # the workflow file alone.
          set -euo pipefail
          TALOS_VERSION=$(grep '^TALOS_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${TALOS_VERSION}" ] || { echo "TALOS_VERSION missing from cluster/config.env"; exit 1; }
          url="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
          sums="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/sha256sum.txt"
          curl --proto '=https' --tlsv1.2 -fsSL -o talosctl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o sha256sum.txt "${sums}"
          expected=$(awk '$2=="talosctl-linux-amd64"{print $1}' sha256sum.txt)
          actual=$(sha256sum talosctl | awk '{print $1}')
          [ "${expected}" = "${actual}" ] || { echo "talosctl checksum mismatch: expected=${expected} actual=${actual}"; exit 1; }
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/talosctl
          talosctl version --client --short

      - name: Generate configs (throwaway secrets)
        run: |
          mkdir -p .s3/secrets .s3/configs .s3/generated/controlplane .s3/generated/worker
          talosctl gen secrets -o .s3/secrets/secrets.yaml
          bash scripts/generate.sh

      - name: Validate control plane configs
        run: |
          for f in .s3/generated/controlplane/*.yaml; do
            echo "Validating ${f}..."
            talosctl validate --config "${f}" --mode metal --strict
          done

      - name: Validate worker configs
        run: |
          for f in .s3/generated/worker/*.yaml; do
            echo "Validating ${f}..."
            talosctl validate --config "${f}" --mode metal --strict
          done

  validate-kustomize:
    name: Validate Flux Kustomize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install kubectl (pinned to cluster KUBERNETES_VERSION)
        run: |
          set -euo pipefail
          KUBERNETES_VERSION=$(grep '^KUBERNETES_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${KUBERNETES_VERSION}" ] || { echo "KUBERNETES_VERSION missing from cluster/config.env"; exit 1; }
          url="https://dl.k8s.io/release/${KUBERNETES_VERSION}/bin/linux/amd64/kubectl"
          sums="${url}.sha256"
          curl --proto '=https' --tlsv1.2 -fsSL -o kubectl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o kubectl.sha256 "${sums}"
          expected="$(cat kubectl.sha256)"
          actual="$(sha256sum kubectl | awk '{print $1}')"
          [ "${expected}" = "${actual}" ] || { echo "kubectl checksum mismatch: expected=${expected} actual=${actual}"; exit 1; }
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Render cluster Kustomize tree
        run: kubectl kustomize clusters/talos-cluster >/dev/null

      - name: Check rendered resource namespaces
        run: |
          set -euo pipefail
          rendered="$(mktemp)"
          kubectl kustomize clusters/talos-cluster >"${rendered}"

          python3 - "${rendered}" <<'PY'
          import re
          import sys

          cluster_scoped_kinds = {
              "APIService",
              "ClusterPolicy",
              "ClusterRole",
              "ClusterRoleBinding",
              "CustomResourceDefinition",
              "GatewayClass",
              "MutatingWebhookConfiguration",
              "Namespace",
              "PriorityClass",
              "StorageClass",
              "ValidatingWebhookConfiguration",
          }

          def top_level_field(lines, field):
              prefix = f"{field}:"
              for line in lines:
                  if line.startswith(prefix):
                      return line.split(":", 1)[1].strip()
              return ""

          def metadata_field(lines, field):
              in_metadata = False
              prefix = f"  {field}:"
              for line in lines:
                  if line == "metadata:":
                      in_metadata = True
                      continue
                  if not in_metadata:
                      continue
                  if line and not line.startswith(" "):
                      break
                  if line.startswith(prefix):
                      return line.split(":", 1)[1].strip()
              return ""

          with open(sys.argv[1], encoding="utf-8") as handle:
              rendered = handle.read()

          missing = []
          for index, doc in enumerate(re.split(r"(?m)^---\s*$", rendered), start=1):
              lines = [line.rstrip("\r") for line in doc.splitlines()]
              kind = top_level_field(lines, "kind")
              if not kind:
                  continue
              namespace = metadata_field(lines, "namespace")
              if namespace or kind in cluster_scoped_kinds:
                  continue
              name = metadata_field(lines, "name") or f"document-{index}"
              missing.append(f"{kind}/{name}")

          if missing:
              print("Rendered namespaced resources missing metadata.namespace:")
              for resource in missing:
                  print(f"- {resource}")
              sys.exit(1)
          PY

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check for hardcoded secrets in tracked files
        run: |
          echo "==> Scanning for secrets in tracked files..."
          FAIL=0

          if grep -rn "BEGIN.*PRIVATE KEY" --include="*.yaml" --include="*.yml" cluster/ addons/ scripts/; then
            echo "FAIL: Private keys found in tracked files!"
            FAIL=1
          fi

          if grep -rn "token:\s*[a-zA-Z0-9/+].\{20,\}" --include="*.yaml" --include="*.yml" cluster/ addons/; then
            echo "FAIL: Possible embedded tokens in cluster configs!"
            FAIL=1
          fi

          if [ "${FAIL}" -eq 1 ]; then
            exit 1
          fi

          echo "==> No secrets detected."
