# =============================================================================
# Validate - always runs on PRs so it can become a required check and so doc
# guards cover README, explanation, compliance, and other documentation changes.
# =============================================================================
name: Validate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check tracked text encoding
        run: python scripts/check-text-encoding.py

      - name: Test read-only Talos drift checker
        run: |
          python scripts/test-talos-drift-readonly.py
          python scripts/render-talos-drift-expected.py --check

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint

      - name: ShellCheck
        run: shellcheck -S warning scripts/*.sh

      - name: YAML Lint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, truthy: {check-keys: false}, comments: {min-spaces-from-content: 1}}}' cluster/ addons/

      - name: "Lint: GitHub Actions workflows (actionlint, pinned + checksum-verified)"
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=$(grep '^ACTIONLINT_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${ACTIONLINT_VERSION}" ] || { echo "ACTIONLINT_VERSION missing from cluster/config.env"; exit 1; }
          ver="${ACTIONLINT_VERSION#v}"
          base="https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}"
          curl --proto '=https' --tlsv1.2 -fsSL -o "actionlint_${ver}_linux_amd64.tar.gz" "${base}/actionlint_${ver}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL -o "actionlint_${ver}_checksums.txt" "${base}/actionlint_${ver}_checksums.txt"
          grep "  actionlint_${ver}_linux_amd64.tar.gz$" "actionlint_${ver}_checksums.txt" | sha256sum -c -
          tar -xzf "actionlint_${ver}_linux_amd64.tar.gz" actionlint
          ./actionlint -color

  maintenance-iso:
    name: Maintenance ISO Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate maintenance ISO builder guard
        run: |
          bash -n scripts/build-maintenance-iso.sh
          bash scripts/build-maintenance-iso.sh --self-test

  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install talosctl (pinned to cluster TALOS_VERSION)
        run: |
          # Pin to the cluster's Talos version (cluster/config.env) instead of
          # piping the upstream installer to sh, which always fetches the
          # latest release. CI must validate against the same talosctl version
          # the cluster runs, and the asset + checksum must be auditable from
          # the workflow file alone.
          set -euo pipefail
          TALOS_VERSION=$(grep '^TALOS_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${TALOS_VERSION}" ] || { echo "TALOS_VERSION missing from cluster/config.env"; exit 1; }
          url="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
          sums="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/sha256sum.txt"
          curl --proto '=https' --tlsv1.2 -fsSL -o talosctl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o sha256sum.txt "${sums}"
          expected=$(awk '$2=="talosctl-linux-amd64"{print $1}' sha256sum.txt)
          actual=$(sha256sum talosctl | awk '{print $1}')
          [ "${expected}" = "${actual}" ] || { echo "talosctl checksum mismatch: expected=${expected} actual=${actual}"; exit 1; }
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/talosctl
          talosctl version --client --short

      - name: Generate configs (throwaway secrets)
        run: |
          mkdir -p .s3/secrets .s3/configs .s3/generated/controlplane .s3/generated/worker
          talosctl gen secrets -o .s3/secrets/secrets.yaml
          bash scripts/generate.sh

      - name: Validate control plane configs
        run: |
          for f in .s3/generated/controlplane/*.yaml; do
            echo "Validating ${f}..."
            talosctl validate --config "${f}" --mode metal --strict
          done

      - name: Validate worker configs
        run: |
          for f in .s3/generated/worker/*.yaml; do
            echo "Validating ${f}..."
            talosctl validate --config "${f}" --mode metal --strict
          done

  validate-kustomize:
    name: Validate Flux Kustomize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install kubectl (pinned to cluster KUBERNETES_VERSION)
        run: |
          set -euo pipefail
          KUBERNETES_VERSION=$(grep '^KUBERNETES_VERSION=' cluster/config.env | cut -d'"' -f2)
          [ -n "${KUBERNETES_VERSION}" ] || { echo "KUBERNETES_VERSION missing from cluster/config.env"; exit 1; }
          url="https://dl.k8s.io/release/${KUBERNETES_VERSION}/bin/linux/amd64/kubectl"
          sums="${url}.sha256"
          curl --proto '=https' --tlsv1.2 -fsSL -o kubectl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o kubectl.sha256 "${sums}"
          expected="$(cat kubectl.sha256)"
          actual="$(sha256sum kubectl | awk '{print $1}')"
          [ "${expected}" = "${actual}" ] || { echo "kubectl checksum mismatch: expected=${expected} actual=${actual}"; exit 1; }
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Install YAML parser
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-yaml

      - name: "Guard: per-node Talos patches match config.env + systems"
        run: python3 scripts/check-node-patch-consistency.py

      - name: "Guard self-test: node-patch consistency guard bites"
        run: python3 scripts/check-node-patch-consistency.selftest.py

      - name: "Guard: declared SOPS secrets are actually encrypted"
        run: python3 scripts/check-sops-encrypted.py

      - name: "Guard self-test: SOPS-encrypted guard bites"
        run: python3 scripts/check-sops-encrypted.selftest.py

      - name: "Guard: internal doc links resolve"
        run: python3 scripts/check-doc-links.py

      - name: "Guard self-test: doc-link guard bites"
        run: python3 scripts/check-doc-links.selftest.py

      - name: "Guard: doc schedule claims match source schedules"
        run: python3 scripts/check-doc-schedule-claims.py

      - name: "Guard self-test: doc schedule claim guard bites"
        run: python3 scripts/check-doc-schedule-claims.selftest.py

      - name: "Guard: first-party image digests are pinned and in sync"
        run: python3 scripts/check-image-digest-sync.py

      - name: "Guard self-test: image digest guard bites"
        run: python3 scripts/check-image-digest-sync.selftest.py

      - name: "Guard: Flux CRD served/storage versions match expected map"
        run: python3 scripts/check-flux-crd-served-versions.py

      - name: "Guard self-test: Flux CRD served-version guard bites"
        run: python3 scripts/check-flux-crd-served-versions.selftest.py

      - name: "Guard: first-party images are signature-Enforce-covered"
        run: python3 scripts/check-image-signature-enforcement.py

      - name: "Guard self-test: image-signature-enforcement guard bites"
        run: python3 scripts/check-image-signature-enforcement.selftest.py

      - name: "Guard: ARC runner GitHub-egress CNP host sets match"
        run: python3 scripts/check-runner-cnp-github-parity.py

      - name: "Guard self-test: runner CNP GitHub-egress parity guard bites"
        run: python3 scripts/check-runner-cnp-github-parity.selftest.py

      - name: "Guard self-test: workflow-health stale-exception logic"
        run: python3 scripts/check-workflow-health.selftest.py

      - name: "Guard: no orphaned Renovate annotations"
        run: python3 scripts/check-renovate-coverage.py

      - name: "Guard self-test: renovate-coverage guard bites"
        run: python3 scripts/check-renovate-coverage.selftest.py

      - name: "Guard: Longhorn addon values match Flux HelmRelease"
        run: python3 scripts/check-longhorn-values-sync.py

      - name: "Guard: Cilium addon values and version match Flux HelmRelease"
        run: python3 scripts/check-cilium-values-sync.py

      - name: "Guard: kubelet-csr-approver addon values match Flux HelmRelease"
        run: python3 scripts/check-kubelet-csr-approver-values-sync.py

      - name: "Guard self-test: kubelet-csr-approver values guard bites"
        run: python3 scripts/check-kubelet-csr-approver-values-sync.selftest.py

      - name: "Guard: node inventory matches config.env"
        run: python3 scripts/check-node-inventory-sync.py

      - name: Render cluster Kustomize tree
        run: kubectl kustomize clusters/talos-cluster >/dev/null

      - name: "Guard: no template placeholder leak"
        run: bash scripts/check-no-placeholder-leak.sh

      - name: "Guard: Vault-fold invariants"
        run: bash scripts/check-vault-fold-invariants.sh

      - name: "Guard: live Vault generate-root stays scratch-only"
        run: bash scripts/check-live-vault-config-invariants.sh

      - name: "Guard: managed Vault policy HCL cannot escalate privilege"
        run: python3 scripts/check-vault-policy-no-escalation.py

      - name: "Guard self-test: Vault policy escalation guard bites"
        run: python3 scripts/check-vault-policy-no-escalation.selftest.py

      - name: "Guard: vault-config-operator bootstrap identity invariants"
        run: python3 scripts/check-vault-config-operator-bootstrap-invariants.py

      - name: "Guard self-test: bootstrap-invariant guard bites"
        run: python3 scripts/check-vault-config-operator-bootstrap-invariants.selftest.py

      - name: "Guard self-test: adoption-parity projections bite"
        run: python3 scripts/vault-config/verify-adoption-parity.selftest.py

      - name: "Guard: Vault restore-validator boundary"
        run: bash scripts/check-vault-restore-validator-boundaries.sh

      - name: "Guard self-test: restore-validator boundary regression"
        run: python3 scripts/check-vault-restore-validator-boundaries.selftest.py

      - name: Check rendered resource namespaces
        run: |
          set -euo pipefail
          rendered="$(mktemp)"
          kubectl kustomize clusters/talos-cluster >"${rendered}"

          python3 - "${rendered}" <<'PY'
          import re
          import sys

          cluster_scoped_kinds = {
              "APIService",
              "ClusterPolicy",
              "ClusterRole",
              "ClusterRoleBinding",
              "CustomResourceDefinition",
              "GatewayClass",
              "MutatingWebhookConfiguration",
              "Namespace",
              "PriorityClass",
              "StorageClass",
              "ValidatingAdmissionPolicy",
              "ValidatingAdmissionPolicyBinding",
              "ValidatingWebhookConfiguration",
          }

          def top_level_field(lines, field):
              prefix = f"{field}:"
              for line in lines:
                  if line.startswith(prefix):
                      return line.split(":", 1)[1].strip()
              return ""

          def metadata_field(lines, field):
              in_metadata = False
              prefix = f"  {field}:"
              for line in lines:
                  if line == "metadata:":
                      in_metadata = True
                      continue
                  if not in_metadata:
                      continue
                  if line and not line.startswith(" "):
                      break
                  if line.startswith(prefix):
                      return line.split(":", 1)[1].strip()
              return ""

          with open(sys.argv[1], encoding="utf-8") as handle:
              rendered = handle.read()

          missing = []
          for index, doc in enumerate(re.split(r"(?m)^---\s*$", rendered), start=1):
              lines = [line.rstrip("\r") for line in doc.splitlines()]
              kind = top_level_field(lines, "kind")
              if not kind:
                  continue
              namespace = metadata_field(lines, "namespace")
              if namespace or kind in cluster_scoped_kinds:
                  continue
              name = metadata_field(lines, "name") or f"document-{index}"
              missing.append(f"{kind}/{name}")

          if missing:
              print("Rendered namespaced resources missing metadata.namespace:")
              for resource in missing:
                  print(f"- {resource}")
              sys.exit(1)
          PY

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for hardcoded secrets in tracked files
        run: |
          echo "==> Scanning for secrets in tracked files..."
          FAIL=0

          if grep -rn "BEGIN.*PRIVATE KEY" --include="*.yaml" --include="*.yml" cluster/ addons/ scripts/; then
            echo "FAIL: Private keys found in tracked files!"
            FAIL=1
          fi

          if grep -rn "token:\s*[a-zA-Z0-9/+].\{20,\}" --include="*.yaml" --include="*.yml" cluster/ addons/; then
            echo "FAIL: Possible embedded tokens in cluster configs!"
            FAIL=1
          fi

          if [ "${FAIL}" -eq 1 ]; then
            exit 1
          fi

          echo "==> No secrets detected."
