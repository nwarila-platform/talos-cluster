# =============================================================================
# Workflow Health - weekly guard against silent pipeline death
# =============================================================================
name: Workflow Health

on:
  schedule:
    - cron: "17 7 * * 2"  # Weekly, Tuesday 07:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  check:
    name: Check workflow health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check workflow health
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check-workflow-health.py
