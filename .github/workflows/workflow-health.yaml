# =============================================================================
# Workflow Health - weekly guard against silent pipeline death
# =============================================================================
name: Workflow Health

on:
  schedule:
    - cron: "17 7 * * 2"  # Weekly, Tuesday 07:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  check:
    name: Check workflow health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check workflow health
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check-workflow-health.py
