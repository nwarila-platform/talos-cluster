name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "30 6 * * 0"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: NWarila/terraform-template/.github/workflows/reusable-codeql.yaml@2f343e5c4bc7f069f27628dfe0b597eb96f34b05

