name: Terraform Platform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/platform/**"
      - ".github/workflows/terraform-platform-apply.yml"

permissions:
  contents: read

concurrency:
  group: terraform-platform-apply
  cancel-in-progress: false

jobs:
  apply:
    name: plan + apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: platform-apply
    env:
      RUN_ID: ${{ github.run_id }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::793496711039:role/github_nwarila-platform_talos-cluster_platform_apply
          role-session-name: gh-platform-apply-${{ github.run_id }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.9.5

      - name: terraform init
        working-directory: terraform/platform
        run: terraform init

      - name: terraform plan
        working-directory: terraform/platform
        run: terraform plan -out=tfplan -input=false -no-color
        # Output is intentionally not echoed to logs in full; sanitized summary below.

      - name: terraform apply
        working-directory: terraform/platform
        run: terraform apply -input=false -auto-approve tfplan

      - name: sanitized summary
        if: always()
        working-directory: terraform/platform
        run: |
          {
            echo "## Platform apply summary"
            echo ""
            echo "- ref: \`${COMMIT_SHA}\`"
            echo "- run: \`${RUN_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
