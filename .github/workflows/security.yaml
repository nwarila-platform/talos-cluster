name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: NWarila/terraform-template/.github/workflows/reusable-iac-security.yaml@d9e5d5c0510f649a36ffec2fad1fef510d0c6baf
    with:
      zizmor_advisory: true

