name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: NWarila/terraform-template/.github/workflows/reusable-iac-security.yaml@6eba3b35a1d1b522308c553622506c92ff7c26d5
    with:
      zizmor_advisory: true
      trivy_advisory: true
      gitleaks_advisory: true

