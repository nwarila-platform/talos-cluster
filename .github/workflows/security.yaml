name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: NWarila/terraform-template/.github/workflows/reusable-iac-security.yaml@7f4e8c486e88d64bfc868d27ff356bd0e1355549

