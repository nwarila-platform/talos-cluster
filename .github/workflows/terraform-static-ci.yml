name: Terraform Static CI

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/**"
      - "iam/**"

permissions:
  contents: read

concurrency:
  group: terraform-static-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: |
          curl -sSLo actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.1/actionlint_1.7.1_linux_amd64.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: [bootstrap, platform]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - name: terraform fmt -check -recursive
        working-directory: terraform/${{ matrix.stack }}
        run: terraform fmt -check -recursive
      - name: terraform init -backend=false
        working-directory: terraform/${{ matrix.stack }}
        run: terraform init -backend=false
      - name: terraform validate
        working-directory: terraform/${{ matrix.stack }}
        run: terraform validate
