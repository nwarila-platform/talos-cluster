# =============================================================================
# Deploy — manual trigger for applying configs or upgrading nodes
#
# IMPORTANT: This workflow requires a self-hosted runner with network access
# to the Talos nodes (10.69.112.0/24). GitHub-hosted runners cannot reach
# private networks. Configure a runner on your management network.
# =============================================================================
name: Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - upgrade
      target:
        description: "Target nodes from cluster/config.env (comma-separated hostnames, or 'all')"
        required: true
        default: "all"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    # CHANGE THIS to your self-hosted runner label
    runs-on: self-hosted
    environment: production  # Requires manual approval in GitHub settings
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target nodes
        id: targets
        env:
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          source cluster/config.env

          declare -A VALID=()
          valid_nodes=()
          for entry in ${CP_NODES} ${WORKER_NODES}; do
            hostname="${entry%%:*}"
            VALID["${hostname}"]=1
            valid_nodes+=("${hostname}")
          done

          if [[ "${TARGET}" == "all" ]]; then
            echo "nodes=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          IFS=',' read -ra requested_nodes <<< "${TARGET}"
          nodes=()
          for raw in "${requested_nodes[@]}"; do
            hostname="${raw//[[:space:]]/}"
            if [[ -z "${hostname}" || -z "${VALID[${hostname}]+x}" ]]; then
              echo "Invalid target '${raw}'. Use 'all' or one of: ${valid_nodes[*]}" >&2
              exit 1
            fi
            nodes+=("${hostname}")
          done

          echo "nodes=${nodes[*]}" >> "${GITHUB_OUTPUT}"

      - name: Install talosctl
        run: |
          TALOS_VERSION=$(grep '^TALOS_VERSION=' cluster/config.env | cut -d'"' -f2)
          url="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64"
          sums="https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/sha256sum.txt"
          curl --proto '=https' --tlsv1.2 -fsSL -o talosctl "${url}"
          curl --proto '=https' --tlsv1.2 -fsSL -o sha256sum.txt "${sums}"
          expected=$(awk '$2=="talosctl-linux-amd64"{print $1}' sha256sum.txt)
          actual=$(sha256sum talosctl | awk '{print $1}')
          [ "${expected}" = "${actual}" ] || { echo "talosctl checksum mismatch: expected=${expected} actual=${actual}"; exit 1; }
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/talosctl
          talosctl version --client --short

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull secrets from S3
        run: make s3-pull

      - name: Generate configs
        run: make generate

      - name: Validate configs
        run: make validate

      - name: Apply configs
        if: inputs.action == 'apply'
        env:
          NODES: ${{ steps.targets.outputs.nodes }}
        run: |
          if [ -z "${NODES}" ]; then
            make apply
          else
            make apply NODES="${NODES}"
          fi

      - name: Upgrade nodes
        if: inputs.action == 'upgrade'
        env:
          NODES: ${{ steps.targets.outputs.nodes }}
        # YES=1 bypasses upgrade.sh's interactive prompt; the GitHub
        # `environment: production` gate above is the operator approval.
        run: |
          if [ -z "${NODES}" ]; then
            make upgrade YES=1
          else
            make upgrade NODES="${NODES}" YES=1
          fi

      - name: Health check
        run: make health
