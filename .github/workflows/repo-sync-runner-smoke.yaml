name: repo-sync-runner-smoke

# THROWAWAY smoke test (credential-delivery capability Step 6). Proves the dedicated
# repo-sync ARC runner can read the SOPS/Flux-mounted nwarila-repo-sync App PEM and mint a
# nwarila-repo-sync[bot] installation token via create-github-app-token. Removed in Step 8.
# Dispatch-only; never prints the key or the token.
on:
  workflow_dispatch:

permissions: {}

jobs:
  smoke:
    runs-on: nwarila-repo-sync-arc-ci   # the Step-5 scale set (gha-runner-scale-set: runs-on == runnerScaleSetName)
    timeout-minutes: 5
    steps:
      - name: Verify the mounted App key is present and PEM-shaped (no contents printed)
        run: |
          set -euo pipefail
          KEY=/opt/repo-sync/private-key.pem
          test -s "$KEY"
          grep -q "PRIVATE KEY" "$KEY"
          echo "key file present, non-empty, PEM-shaped"
          echo "sha256: $(sha256sum "$KEY" | cut -d' ' -f1)"

      - name: Load PEM into a step output (newline-safe heredoc; not echoed)
        id: readkey
        run: |
          set -euo pipefail
          {
            echo "pem<<__PEM_EOF__"
            cat /opt/repo-sync/private-key.pem
            echo "__PEM_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Mint nwarila-repo-sync[bot] installation token
        id: apptoken
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: "4080021"   # nwarila-repo-sync GitHub App (public identifier, not a secret)
          private-key: ${{ steps.readkey.outputs.pem }}
          # NOTE: no `owner:` -> token is scoped to THIS repo's installation only (least privilege).
          permission-contents: read

      - name: Prove the token authenticates (read-only identity check; no secrets printed)
        env:
          GH_APP_TOKEN: ${{ steps.apptoken.outputs.token }}
          APP_SLUG: ${{ steps.apptoken.outputs.app-slug }}
          INSTALL_ID: ${{ steps.apptoken.outputs.installation-id }}
        run: |
          set -euo pipefail
          echo "minted for app-slug: $APP_SLUG"
          echo "installation-id: $INSTALL_ID"
          code=$(curl -sS -o /tmp/inst.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/installation/repositories)
          echo "GET /installation/repositories -> HTTP $code"
          test "$code" = "200"
          grep -o '"full_name": *"[^"]*"' /tmp/inst.json || true
