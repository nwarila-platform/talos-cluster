name: Terraform Bootstrap Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY-talos-cluster-bootstrap to proceed'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: terraform-bootstrap-destroy
  cancel-in-progress: false

env:
  PLANS_BUCKET: "793496711039-terraform"
  PLANS_PREFIX: "nwarila-platform/talos-cluster/plans/destroy"

jobs:
  guard:
    name: guard ref + confirmation
    runs-on: ubuntu-latest
    env:
      GITHUB_REF_INPUT: ${{ github.ref }}
      CONFIRM_INPUT: ${{ inputs.confirm }}
    steps:
      - name: ensure refs/heads/main
        run: |
          if [ "$GITHUB_REF_INPUT" != "refs/heads/main" ]; then
            echo "::error::Destroy workflow may only run against refs/heads/main (got $GITHUB_REF_INPUT)"
            exit 1
          fi
      - name: ensure exact confirmation string
        run: |
          if [ "$CONFIRM_INPUT" != "DESTROY-talos-cluster-bootstrap" ]; then
            echo "::error::Confirmation string did not match"
            exit 1
          fi

  destroy_plan:
    name: bootstrap destroy plan
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: bootstrap-plan
    env:
      RUN_ID: ${{ github.run_id }}
      COMMIT_SHA: ${{ github.sha }}
    outputs:
      plan_version_id: ${{ steps.upload.outputs.version_id }}
      plan_key: ${{ steps.upload.outputs.key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::793496711039:role/github_nwarila-platform_talos-cluster_bootstrap_plan
          role-session-name: gh-bootstrap-destroy-plan-${{ github.run_id }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.9.5

      - name: terraform init
        working-directory: terraform/bootstrap
        run: terraform init

      - name: terraform plan -destroy -out=tfplan
        working-directory: terraform/bootstrap
        run: terraform plan -destroy -out=tfplan -input=false -no-color

      - name: upload destroy plan to private S3 (versioned)
        id: upload
        working-directory: terraform/bootstrap
        run: |
          KEY="${PLANS_PREFIX}/${RUN_ID}-${COMMIT_SHA}.tfplan"
          aws s3api put-object \
            --bucket "$PLANS_BUCKET" \
            --key "$KEY" \
            --body tfplan \
            --server-side-encryption AES256 \
            --query VersionId --output text > version_id.txt
          {
            echo "version_id=$(cat version_id.txt)"
            echo "key=$KEY"
          } >> "$GITHUB_OUTPUT"

      - name: sanitized summary
        if: always()
        run: |
          {
            echo "## Bootstrap destroy plan summary"
            echo ""
            echo "- ref: \`${COMMIT_SHA}\`"
            echo "- run: \`${RUN_ID}\`"
            echo "- destroy plan stored privately"
          } >> "$GITHUB_STEP_SUMMARY"

  destroy:
    name: bootstrap destroy
    needs: destroy_plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: bootstrap-destroy
    env:
      RUN_ID: ${{ github.run_id }}
      COMMIT_SHA: ${{ github.sha }}
      PLAN_KEY: ${{ needs.destroy_plan.outputs.plan_key }}
      PLAN_VERSION_ID: ${{ needs.destroy_plan.outputs.plan_version_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::793496711039:role/github_nwarila-platform_talos-cluster_bootstrap_destroy
          role-session-name: gh-bootstrap-destroy-${{ github.run_id }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.9.5

      - name: terraform init
        working-directory: terraform/bootstrap
        run: terraform init

      - name: download exact destroy plan by version id
        working-directory: terraform/bootstrap
        run: |
          aws s3api get-object \
            --bucket "$PLANS_BUCKET" \
            --key "$PLAN_KEY" \
            --version-id "$PLAN_VERSION_ID" \
            tfplan

      - name: terraform apply tfplan
        working-directory: terraform/bootstrap
        run: terraform apply -input=false -auto-approve tfplan

      - name: sanitized summary
        if: always()
        run: |
          {
            echo "## Bootstrap destroy summary"
            echo ""
            echo "- ref: \`${COMMIT_SHA}\`"
            echo "- run: \`${RUN_ID}\`"
          } >> "$GITHUB_STEP_SUMMARY"
