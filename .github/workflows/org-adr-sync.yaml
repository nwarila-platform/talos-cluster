name: Org ADR Sync

# NWarila/drift-gate is not on the repo Actions allowlist
# (allowed_actions: selected), so any run startup-fails with 0 jobs.
# Auto-triggers were removed to end the perpetual 148/148 red history.
# Kept dispatch-only so it works as-is once the gate is restored; see
# TD-0004 / P0.1.
on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  baseline:
    name: org-adr / verify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Drift gate (org ADR baseline)
        # renovate: datasource=git-refs depName=NWarila/drift-gate
        uses: NWarila/drift-gate@dac07c2b2a30a084b3577d4712549291ae99879c
        with:
          source-repo: nwarila-platform/.github
          # renovate: datasource=git-refs depName=nwarila-platform/.github
          source-ref: 0d2a0752d4c618907d735af4a7c12a9214c8517e
          manifest: org-adr-manifest.json
          check-name: org-adr / verify
