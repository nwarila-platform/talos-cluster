# =============================================================================
# Cilium CNI — Helm values for Talos
# Chart: cilium/cilium v1.19.4 (pinned in cluster/config.env)
#
# WHY RETAINED:
# These are OUT-OF-BAND bootstrap Helm values, installed before Flux can
# reconcile the cluster. Keep this file for cluster rebuilds; it is not the
# Flux-managed runtime source.
# =============================================================================
ipam:
  mode: kubernetes

kubeProxyReplacement: true

# Talos mounts cgroup2 at /sys/fs/cgroup
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Use KubePrism local proxy for K8s API access
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445

# Required capabilities for Talos (immutable OS)
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Gateway API: the `cilium` GatewayClass is owned by Flux (apps/gateway-api/),
# NOT this chart. Default `create: auto` makes the chart try to adopt the
# Flux-owned GatewayClass and every `helm upgrade` then fails the ownership
# check. Force the chart to never manage it; Flux remains sole owner.
gatewayAPI:
  gatewayClass:
    create: "false"

# -----------------------------------------------------------------------------
# Transparent encryption — WireGuard (Cilium 1.19.4), pod-to-pod only.
# WireGuard wraps the VXLAN-encapsulated payload (double encap on a 1500 underlay).
# cilium_wg0 (UDP 51871, opened in the Talos firewall Step 140) is created + keyed
# per node at agent startup. nodeEncryption:false — host-plane traffic stays
# cleartext (already firewalled to the node subnet); `true` is beta w/ an MTU bug.
# MTU 1380: 1500 - 50 (VXLAN) - 60 (WireGuard) = 1390; 1380 for margin. New pods
# get 1380; existing pods keep 1500 + rely on Cilium TCP MSS clamping — don't bounce them.
# NOTE: enable-wireguard/mtu apply only at agent STARTUP, so a `kubectl rollout
# restart ds/cilium` after the helm upgrade is REQUIRED (Step 143 lesson).
# -----------------------------------------------------------------------------
encryption:
  enabled: true
  type: wireguard
  nodeEncryption: false
MTU: 1380
