# =============================================================================
# Ingress NGINX — Helm values
# Chart: ingress-nginx/ingress-nginx
# =============================================================================
controller:
  # Use DaemonSet to run on all workers
  kind: DaemonSet

  # Use host network for direct access (no LoadBalancer in bare metal)
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

  service:
    type: ClusterIP

  # Admission webhook
  admissionWebhooks:
    enabled: true

  metrics:
    enabled: true
