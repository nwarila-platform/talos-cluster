apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-talos
  namespace: poc
  labels:
    app: hello-talos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-talos
  template:
    metadata:
      labels:
        app: hello-talos
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: hello-talos-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-talos-html
  namespace: poc
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>TDNHQ-TALCL01</title>
      <style>
        body { font-family: monospace; background: #1a1a2e; color: #0f0; padding: 40px; }
        .box { border: 1px solid #0f0; padding: 20px; max-width: 600px; margin: 0 auto; }
        h1 { color: #0ff; }
        .status { color: #0f0; }
        .info { color: #888; margin-top: 20px; font-size: 12px; }
      </style>
    </head>
    <body>
      <div class="box">
        <h1>TDNHQ-TALCL01</h1>
        <p class="status">Talos Kubernetes Cluster - OPERATIONAL</p>
        <hr style="border-color: #333;">
        <p>Talos OS: v1.12.5</p>
        <p>Kubernetes: v1.35.2</p>
        <p>CNI: Cilium v1.16.6</p>
        <p>Nodes: 3 control-plane + 3 workers</p>
        <p class="info">This is a proof-of-concept deployment confirming the cluster is fully functional.</p>
      </div>
    </body>
    </html>
