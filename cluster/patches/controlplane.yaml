# =============================================================================
# Control plane patch — applied to all CP nodes
# =============================================================================
machine:
  certSANs:
    - 10.69.112.62
    - 10.69.112.63
    - 10.69.112.64
cluster:
  allowSchedulingOnControlPlanes: false
  # Cilium replaces both Flannel and kube-proxy
  network:
    cni:
      name: none
  proxy:
    disabled: true
  apiServer:
    certSANs:
      - 10.69.112.62
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: baseline
            enforce-version: latest
            audit: restricted
            audit-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            namespaces:
              - cilium
            runtimeClasses: []
            usernames: []
  controllerManager:
    extraArgs:
      bind-address: "0.0.0.0"
  scheduler:
    extraArgs:
      bind-address: "0.0.0.0"
  etcd:
    extraArgs:
      listen-metrics-urls: http://0.0.0.0:2381
