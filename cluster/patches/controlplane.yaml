# =============================================================================
# Control plane patch — applied to all CP nodes
#
# Aligned with live cluster machine config as of 2026-05-25. The following
# hardening additions were declared here but never applied, and have been
# dropped pending intentional rollout cycles:
#   - machine.certSANs (Talos API cert SANs)
#   - cluster.apiServer.certSANs (kube-apiserver cert SANs)
#   - controllerManager.extraArgs.bind-address: 0.0.0.0
#   - scheduler.extraArgs.bind-address: 0.0.0.0
#   - etcd.extraArgs.listen-metrics-urls
# See diff session of 2026-05-25 in conversation history.
# =============================================================================
cluster:
  allowSchedulingOnControlPlanes: false
  # Cilium replaces both Flannel and kube-proxy
  network:
    cni:
      name: none
  proxy:
    disabled: true
  # discovery.registries: both registries enabled to match live state
  # (the registry "disabled" flags are explicitly false on the live cluster).
  discovery:
    registries:
      kubernetes:
        disabled: false
      service:
        disabled: false
  apiServer:
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1alpha1
          kind: PodSecurityConfiguration
          defaults:
            enforce: baseline
            enforce-version: latest
            audit: restricted
            audit-version: latest
            warn: restricted
            warn-version: latest
          exemptions:
            namespaces: []
            runtimeClasses: []
            usernames: []
