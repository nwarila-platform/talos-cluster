# =============================================================================
# Worker patch — applied to all worker nodes
#
# `cluster.*` fields are duplicated from controlplane.yaml because
# `--config-patch-control-plane` does not propagate to worker output, and
# the worker's view of the cluster spec must match the CP's view for CNI,
# kube-proxy, and discovery behaviour to be consistent. Where worker and
# CP values legitimately differ (e.g., discovery.registries.kubernetes
# disabled on CP, enabled on workers), this file follows the live state.
# =============================================================================
machine:
  kubelet:
    # Lock the kubelet's node-IP selector to the management subnet so a
    # future addon adding a secondary interface (Cilium L2 announcements,
    # MetalLB IP pool, cluster-mesh) cannot flip Node InternalIP and
    # invalidate every kubeconfig + Service endpoint targeting the node.
    # Worker-only because CPs don't host stateless pods.
    nodeIP:
      validSubnets:
        - 10.69.112.0/24
cluster:
  network:
    cni:
      name: none
  proxy:
    disabled: true
  discovery:
    registries:
      kubernetes:
        disabled: false
      service:
        disabled: false
