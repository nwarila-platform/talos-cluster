# =============================================================================
# SecureBoot+TPM volumes patch - appended only to SECUREBOOT_TPM_NODES
#
# During the staged fleet migration, this captures the install-time storage
# state for nodes that have been physically reprovisioned for SecureBoot:
# w3 back-fills the live canary, and w2 prepares the next reprovision.
#
# `tpm: {}` intentionally relies on Talos v1.13's default PCR binding: PCR 7
# for SecureBoot state, plus Talos' signed PCR 11 policy for boot integrity.
# =============================================================================
---
apiVersion: v1alpha1
kind: VolumeConfig
name: STATE
encryption:
  provider: luks2
  keys:
    - slot: 0
      tpm: {}
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: system_disk
  maxSize: 25GiB
encryption:
  provider: luks2
  keys:
    - slot: 0
      tpm: {}
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: longhorn
provisioning:
  diskSelector:
    match: system_disk
  maxSize: 240GiB
  minSize: 50GiB
