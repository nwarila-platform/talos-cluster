apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-arc-runner-egress
  namespace: arc-runners
spec:
  endpointSelector:
    matchLabels:
      arc.nwarila.io/role: runner
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: github.com
        - matchName: api.github.com
        - matchName: codeload.github.com
        - matchPattern: "*.actions.githubusercontent.com"
        - matchName: results-receiver.actions.githubusercontent.com
        - matchPattern: "*.blob.core.windows.net"
        - matchName: objects.githubusercontent.com
        - matchName: objects-origin.githubusercontent.com
        - matchName: github-releases.githubusercontent.com
        - matchName: github-registry-files.githubusercontent.com
        - matchName: awscli.amazonaws.com
        - matchName: sts.amazonaws.com
        - matchPattern: "sts.*.amazonaws.com"
        - matchPattern: "s3.*.amazonaws.com"
        - matchPattern: "*.s3.*.amazonaws.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # WHY (#266): control-plane node IPs carry Cilium's reserved kube-apiserver
    # identity, so this entity rule matches API-server endpoints that CIDR rules do not.
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # WHY (#266): the L2-announced kube VIP may not resolve to the reserved
    # kube-apiserver identity, so this CIDR fallback admits direct VIP traffic.
    - toCIDR:
        - 10.69.112.62/32
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
