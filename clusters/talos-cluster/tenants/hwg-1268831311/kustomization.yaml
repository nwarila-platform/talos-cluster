apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hwg-1268831311
resources:
  - ../_template/zero-touch/base
configMapGenerator:
  - name: tenant-contract
    literals:
      - tenantId=hwg-1268831311
      - orgPrefix=hwg
      - org=the-hero-wars-guys
      - deployRepo=deploy-herowars-engine-porter
      - deployRepoGit=deploy-herowars-engine-porter.git
      - sourceName=deploy-herowars-engine-porter
      - appAuthSecret=hwg-1268831311-gitops-source-auth
      - repoId=1268831311
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    config.kubernetes.io/local-config: "true"
patches:
  - target:
      kind: Namespace
    patch: |-
      - op: add
        path: /metadata/labels/nwarila.io~1deploy-repo
        value: "deploy-herowars-engine-porter"
      - op: add
        path: /metadata/labels/nwarila.io~1repo-id
        value: "1268831311"
      - op: add
        path: /metadata/labels/nwarila.io~1org
        value: "the-hero-wars-guys"
replacements:
  - source:
      kind: ConfigMap
      name: tenant-contract
      fieldPath: data.tenantId
    targets:
      - select:
          kind: Kustomization
        fieldPaths:
          - metadata.name
          - spec.targetNamespace
  - source:
      kind: ConfigMap
      name: tenant-contract
      fieldPath: data.sourceName
    targets:
      - select:
          kind: GitRepository
          name: source-placeholder
        fieldPaths:
          - metadata.name
      - select:
          kind: Kustomization
        fieldPaths:
          - spec.sourceRef.name
  - source:
      kind: ConfigMap
      name: tenant-contract
      fieldPath: data.org
    targets:
      - select:
          kind: GitRepository
        fieldPaths:
          - spec.url
        options:
          delimiter: /
          index: 3
  - source:
      kind: ConfigMap
      name: tenant-contract
      fieldPath: data.deployRepoGit
    targets:
      - select:
          kind: GitRepository
        fieldPaths:
          - spec.url
        options:
          delimiter: /
          index: 4
  - source:
      kind: ConfigMap
      name: tenant-contract
      fieldPath: data.appAuthSecret
    targets:
      - select:
          kind: GitRepository
        fieldPaths:
          - spec.secretRef.name
      - select:
          kind: VaultStaticSecret
          name: app-auth-placeholder
        fieldPaths:
          - metadata.name
          - spec.destination.name
  - source:
      kind: ConfigMap
      name: tenant-contract
      fieldPath: data.orgPrefix
    targets:
      - select:
          kind: ServiceAccount
          name: vso-org-pull-placeholder
        fieldPaths:
          - metadata.name
        options:
          delimiter: '-'
          index: 3
      - select:
          kind: VaultStaticSecret
        fieldPaths:
          - spec.path
        options:
          delimiter: '/'
          index: 2
      - select:
          kind: VaultStaticSecret
        fieldPaths:
          - spec.vaultAuthRef
        options:
          delimiter: '-'
          # vaultAuthRef slash-collapse: operator/org is one segment; placeholder is index 4, not 2.
          index: 4
