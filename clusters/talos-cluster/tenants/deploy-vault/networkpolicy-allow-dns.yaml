# Allow DNS egress — every tenant pod needs DNS to resolve service
# names. Targets kube-system/kube-dns on UDP+TCP port 53.
#
# Selectors use the well-known label `kubernetes.io/metadata.name`
# (set automatically by K8s on every namespace) and the `k8s-app:
# kube-dns` label set by CoreDNS (and by Talos's bundled CoreDNS
# manifest).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: deploy-vault
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
