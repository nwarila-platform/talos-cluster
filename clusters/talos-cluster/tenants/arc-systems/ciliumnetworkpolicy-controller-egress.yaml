apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-arc-controller-egress
  namespace: arc-systems
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: arc
      app.kubernetes.io/name: gha-rs-controller
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - kube-apiserver
    - toFQDNs:
        - matchName: github.com
        - matchName: api.github.com
        - matchPattern: "*.actions.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
