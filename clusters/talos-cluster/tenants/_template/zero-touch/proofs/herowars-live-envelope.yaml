kind: ConfigMap
metadata:
  name: vault-ca
  namespace: hwg-herowars-engine-porter
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-visibility
  namespace: hwg-herowars-engine-porter
spec:
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      rules:
        dns:
        - matchPattern: '*'
  endpointSelector: {}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  labels:
    nwarila.io/deploy-repo: "true"
  name: hwg-herowars-engine-porter
  namespace: hwg-herowars-engine-porter
spec:
  interval: 10m
  path: ./kubernetes/overlays/talos-cluster
  prune: true
  serviceAccountName: deploy-reconciler
  sourceRef:
    kind: GitRepository
    name: deploy-herowars-engine-porter
  targetNamespace: hwg-herowars-engine-porter
  timeout: 10m
  wait: true
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: hwg-herowars-engine-porter
spec:
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
  podSelector: {}
  policyTypes:
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: hwg-herowars-engine-porter
spec:
  egress:
  - ports:
    - port: 8200
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: deploy-vault
      podSelector:
        matchLabels:
          app.kubernetes.io/name: vault
  podSelector:
    matchLabels:
      vault-client: "true"
  policyTypes:
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: hwg-herowars-engine-porter
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ghcr-pull
  namespace: hwg-herowars-engine-porter
spec:
  destination:
    create: true
    name: ghcr-pull
    overwrite: true
    type: kubernetes.io/dockerconfigjson
  mount: secret
  path: platform/org-pull/hwg/ghcr-pull
  refreshAfter: 1h
  type: kv-v2
  vaultAuthRef: vault-secrets-operator/org-pull-hwg
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: herowars-gitops-source-auth
  namespace: hwg-herowars-engine-porter
spec:
  destination:
    create: true
    name: herowars-gitops-source-auth
    overwrite: true
    type: Opaque
  mount: secret
  path: platform/org-pull/hwg/gitops-source-auth
  refreshAfter: 1h
  type: kv-v2
  vaultAuthRef: vault-secrets-operator/org-pull-hwg
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  labels:
    nwarila.io/deploy-repo: "true"
  name: deploy-herowars-engine-porter
  namespace: hwg-herowars-engine-porter
spec:
  interval: 5m
  provider: github
  ref:
    branch: main
  secretRef:
    name: herowars-gitops-source-auth
  url: https://github.com/the-hero-wars-guys/deploy-herowars-engine-porter.git
