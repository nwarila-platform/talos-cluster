# Identity for the etcd snapshot CronJob. It needs ZERO Kubernetes API access
# (it talks only to the local Talos apid and writes to its PVC), so no token is
# automounted and no Role/RoleBinding exists for it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: etcd-backup
  namespace: dr-etcd-backup
  labels:
    app.kubernetes.io/name: etcd-backup
    app.kubernetes.io/component: backup
automountServiceAccountToken: false
