# Scoped Talos client credential for the etcd snapshot CronJob.
#
# Minted with `talosctl config new --roles os:etcd:backup --crt-ttl 17520h`
# (client cert O=os:etcd:backup, expires 2028-07-10 - rotation is booked in
# the ADR-0006 amendment). The role authorizes `talosctl etcd snapshot` and
# NOTHING else - config reads and node lifecycle ops are PermissionDenied
# (both verified live 2026-07-11, including a real 109 MB snapshot).
#
# Encrypted with SOPS (repo age key); Flux decrypts at reconcile via the
# sops-age Secret. NOTE: the SOPS MAC covers metadata.name - renaming this
# Secret requires re-encrypting, not hand-editing.
apiVersion: v1
kind: Secret
metadata:
    name: etcd-backup-talosconfig
    namespace: dr-etcd-backup
    labels:
        app.kubernetes.io/name: etcd-backup
        app.kubernetes.io/component: backup
