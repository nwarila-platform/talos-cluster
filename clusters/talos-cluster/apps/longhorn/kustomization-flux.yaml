# Child Flux Kustomization for namespace-scoped Longhorn release resources.
#
# The parent cluster Kustomization creates the longhorn-system Namespace first.
# This child then applies the HelmRepository and HelmRelease into that Namespace,
# avoiding first-reconcile dry-run failures for namespace-scoped resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/talos-cluster/apps/longhorn/release
  prune: true
  wait: true
  timeout: 15m
  force: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: longhorn
      namespace: longhorn-system
