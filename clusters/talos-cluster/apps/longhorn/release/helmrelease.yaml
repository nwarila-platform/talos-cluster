# This HelmRelease adopts the existing manual `longhorn` Helm release.
# Its values mirror addons/longhorn/values.yaml verbatim (ADR-0008 §5).
# The first reconcile should be a near-no-op; the intended delta is only the
# seed ConfigMap's backup-target value from the retired WSL target to Synology.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 10m
  releaseName: longhorn
  chart:
    spec:
      chart: longhorn
      version: "1.11.2"
      sourceRef:
        kind: HelmRepository
        name: longhorn
      interval: 1h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: false
    cleanupOnFail: true
  test:
    enable: false
  values:
    # =============================================================================
    # Longhorn Helm values
    #
    # Chart: longhorn/longhorn v1.11.2 (pinned in cluster/config.env as
    # LONGHORN_VERSION). See docs/decision-records/repo/0007-capture-longhorn-as-managed-addon.md
    # for the reasoning behind each non-default.
    #
    # Talos-side coupling: the data path below (/var/mnt/longhorn) is the
    # Talos auto-mount of the `longhorn` UserVolumeConfig declared in
    # cluster/patches/volumes.yaml — see ADR-0004.
    # =============================================================================

    defaultSettings:
      # Mount path of the Talos UserVolumeConfig `longhorn` (auto-mounted by
      # Talos at /var/mnt/<volume-name>). This is the one setting that hard-
      # couples Helm-side Longhorn to Talos-side storage; changing it without
      # also changing the UserVolumeConfig name in cluster/patches/volumes.yaml
      # leaves Longhorn writing to the system disk's overlay instead of the
      # dedicated 50-240 GiB volume.
      defaultDataPath: /var/mnt/longhorn

      # 2-way replication remains the small-cluster default for ordinary PVCs:
      # it tolerates one node loss without applying 3x storage cost to every
      # workload. Bootstrap-critical PVCs that must survive worker reprovisioning
      # opt into dedicated StorageClasses, such as longhorn-vault. Chart default
      # is 3. The defaultClassReplicaCount below pins the same number for the
      # default StorageClass.
      defaultReplicaCount: 2

      # Force-delete pods stranded on a downed node so the StatefulSet/
      # Deployment can recreate them elsewhere. Without this, a node failure
      # leaves PVC-bound pods Pending indefinitely behind a Terminating
      # placeholder, blocking failover.
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod

      # Permit replica placement when a node has ≥10% free space (chart
      # default 25%). The Talos UserVolumeConfig caps the longhorn volume at
      # 240 GiB; 25% free of that is 60 GiB held in reserve, which is more
      # conservative than this cluster's workloads warrant.
      storageMinimalAvailablePercentage: 10

      # One engine upgrade in flight per node, ever. Lets `helm upgrade`
      # do a rolling engine rollout without flapping multiple nodes at once.
      # Chart default is 0 (disabled).
      concurrentAutomaticEngineUpgradePerNodeLimit: 1

    defaultBackupStore:
      # DR Stage 1 backup target: a dedicated Btrfs NFS share on the Synology
      # RS3621rpxs (TCNHQ-BKUP01, 10.69.128.115) on its own storage VLAN. NFS is
      # credential-free (AUTH_SYS); access is controlled by a per-node-IP export on
      # the NAS plus the dr-backup egress CiliumNetworkPolicy. nfsvers is pinned to
      # 4.1 (DSM's max; Longhorn treats 4.1 as first-class) for a deterministic mount
      # instead of a 4.2->4.1 probe; actimeo=1 is Longhorn's default and avoids v4.1
      # backup-list cache staleness. NAS-side daily immutable snapshots (retain 30)
      # add tamper/ransomware protection the NFS client cannot reach. Replaces the
      # retired interim WSL NFS box. See ADR-0021 and docs/runbooks/dr-stage1-backup.md.
      backupTarget: "nfs://10.69.128.115:/volume1/longhorn-backup?nfsOptions=nfsvers=4.1,actimeo=1"
      backupTargetCredentialSecret: ""

    # Tolerate the control-plane NoSchedule taint on every Longhorn component
    # that needs to run on every node. This is what lets cp1/cp2/cp3 also
    # contribute Longhorn storage. Without these tolerations Longhorn would
    # only run on workers and lose 3 storage targets.
    longhornManager:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    longhornDriver:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    persistence:
      # `longhorn` becomes the cluster's default StorageClass. PVCs without
      # an explicit storageClassName get a Longhorn-backed volume.
      defaultClass: true
      # Matches defaultReplicaCount above so the default SC and the global
      # default don't disagree.
      defaultClassReplicaCount: 2
