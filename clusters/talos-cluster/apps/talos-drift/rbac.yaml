apiVersion: v1
kind: ServiceAccount
metadata:
  name: talos-drift
  namespace: talos-drift
  labels:
    app.kubernetes.io/name: talos-drift
    app.kubernetes.io/component: drift-check
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: talos-drift-readonly
  labels:
    app.kubernetes.io/name: talos-drift
    app.kubernetes.io/component: drift-check
rules:
  - nonResourceURLs:
      - /version
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - kustomize.toolkit.fluxcd.io
    resources:
      - kustomizations
    verbs:
      - get
      - list
  - apiGroups:
      - helm.toolkit.fluxcd.io
    resources:
      - helmreleases
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: talos-drift-readonly
  labels:
    app.kubernetes.io/name: talos-drift
    app.kubernetes.io/component: drift-check
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: talos-drift-readonly
subjects:
  - kind: ServiceAccount
    name: talos-drift
    namespace: talos-drift
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: talos-drift-namespace-access
  namespace: talos-drift
  labels:
    app.kubernetes.io/name: talos-drift
    app.kubernetes.io/component: drift-check
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
    verbs:
      - get
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: talos-drift-namespace-access
  namespace: talos-drift
  labels:
    app.kubernetes.io/name: talos-drift
    app.kubernetes.io/component: drift-check
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: talos-drift-namespace-access
subjects:
  - kind: ServiceAccount
    name: talos-drift
    namespace: talos-drift
