apiVersion: batch/v1
kind: CronJob
metadata:
  name: talos-drift-readonly
  namespace: talos-drift
  labels:
    app.kubernetes.io/name: talos-drift
    app.kubernetes.io/component: drift-check
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: talos-drift
            app.kubernetes.io/component: drift-check
        spec:
          serviceAccountName: talos-drift
          automountServiceAccountToken: true
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: talos-version
              image: ghcr.io/siderolabs/talosctl@sha256:6382e6f6f8b08ab7c5cc9f77446cfd79975fe0055c0a6d73455a9dc6a6c4b98d
              imagePullPolicy: IfNotPresent
              args:
                - --talosconfig=/var/run/talos/talosconfig
                - --nodes=$(TALOS_NODES)
                - version
                - --short
              envFrom:
                - configMapRef:
                    name: talos-drift-expected
              volumeMounts:
                - name: talosconfig
                  mountPath: /var/run/talos/talosconfig
                  subPath: talosconfig
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          containers:
            - name: check
              image: python@sha256:8373231e1e906ddfb457748bfc032c4c06ada8c759b7b62d9c73ec2a3c56e710
              imagePullPolicy: IfNotPresent
              command:
                - python3
                - /opt/talos-drift/check.py
              envFrom:
                - configMapRef:
                    name: talos-drift-expected
              env:
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: POD_UID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.uid
              volumeMounts:
                - name: check-script
                  mountPath: /opt/talos-drift/check.py
                  subPath: check.py
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          volumes:
            - name: talosconfig
              secret:
                secretName: talos-reader-talosconfig
                defaultMode: 0440
            - name: check-script
              configMap:
                name: talos-drift-check
                defaultMode: 0444
