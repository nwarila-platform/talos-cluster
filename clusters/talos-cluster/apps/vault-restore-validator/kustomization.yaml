apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccounts.yaml
  - rbac.yaml
  - networkpolicy-default-deny.yaml
  - ciliumnetworkpolicy-egress.yaml
  - validatingadmissionpolicy.yaml
  - result-configmap.yaml
  - cronjob.yaml

configMapGenerator:
  - name: dr-restore-driver-script
    namespace: dr-validate
    files:
      - restore-driver.sh
    options:
      labels:
        app.kubernetes.io/name: vault-restore-validator
        app.kubernetes.io/component: restore-driver

generatorOptions:
  disableNameSuffixHash: true
