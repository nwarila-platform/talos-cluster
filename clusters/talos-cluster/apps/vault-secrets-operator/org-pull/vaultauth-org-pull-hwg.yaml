apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: org-pull-hwg
  namespace: vault-secrets-operator
spec:
  vaultConnectionRef: default
  method: kubernetes
  mount: kubernetes
  # Safe by design: VSO mints the service-account token from the consuming
  # VaultStaticSecret namespace, and Vault accepts only an SA named
  # vso-org-pull-hwg in a tenant-labeled namespace for this role.
  allowedNamespaces:
    - "*"
  kubernetes:
    role: vso-org-pull-hwg
    serviceAccount: vso-org-pull-hwg
    audiences:
      - vault
