# Child Flux Kustomization for namespace-scoped Kyverno resources.
#
# The parent cluster Kustomization creates the kyverno Namespace first. This
# child then applies the HelmRepository and HelmRelease into that Namespace,
# avoiding first-reconcile dry-run failures for namespace-scoped resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/talos-cluster/apps/kyverno/release
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kyverno
      namespace: kyverno
