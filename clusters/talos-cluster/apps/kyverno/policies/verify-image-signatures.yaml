# ClusterPolicy: verify-image-signatures (Step 8b - audit-mode pilot)
#
# Audit-only cosign keyless signature verification for image families known to
# publish sigstore signatures via GitHub Actions OIDC. This policy intentionally
# does not enforce; failures appear in PolicyReports only. See ADR-0010.
#
# Scope: Flux, Cilium, Kyverno, and nwarila-platform GHCR images. Longhorn,
# registry.k8s.io, and other image families are out of scope for this pilot;
# they fall through without evaluation because their registries are not listed
# in imageReferences.
#
# Sigstore reachability: the kyverno chart NetworkPolicies restrict Ingress
# only; egress to rekor.sigstore.dev and fulcio.sigstore.dev is unrestricted.
# webhookConfiguration.failurePolicy is set to Ignore so webhook/network errors
# do not block admission while in audit mode.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify Image Signatures (Audit)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Audit-mode keyless cosign signature verification for Flux, Cilium,
      Kyverno, and nwarila-platform GHCR images. Generates PolicyReports without
      blocking admission.
spec:
  validationFailureAction: Audit
  background: true
  webhookConfiguration:
    failurePolicy: Ignore
  rules:
    - name: verify-flux-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/fluxcd/*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/fluxcd/.+/\\.github/workflows/.+@refs/.+$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-cilium-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "quay.io/cilium/*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/cilium/.+/\\.github/workflows/.+@refs/.+$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-kyverno-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "reg.kyverno.io/kyverno/*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/kyverno/.+/\\.github/workflows/.+@refs/.+$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-nwarila-platform-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/nwarila-platform/*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/nwarila-platform/.+/\\.github/workflows/.+@refs/(heads/main|tags/v.*)$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
