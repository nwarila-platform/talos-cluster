# ClusterPolicy: verify-image-signatures (scoped)
#
# Scoped cosign keyless signature verification for image families known to
# publish sigstore signatures via GitHub Actions OIDC. nwarila-platform and
# the-hero-wars-guys images are enforced; Flux, Cilium, Kyverno, and VSO remain
# audit-only until they can be enforced without deadlocking GitOps or exceeding
# Kyverno verifyImages support.
# Cilium is matched at the image-family level so signed release digest rotation
# does not require policy churn; known unsigned helper families are skipped
# explicitly. See ADR-0010.
#
# Scope: Flux, Cilium, Kyverno, and nwarila-platform GHCR images. Longhorn,
# registry.k8s.io, and other image families are out of scope for this policy;
# they fall through without evaluation because their registries are not listed
# in imageReferences. Kyverno release images are verified from GHCR because the
# reg.kyverno.io v1.18.1 mirrors do not expose discoverable cosign signatures.
# Kyverno component signatures live in the upstream shared signature repository,
# not co-located with each component image. Vault Secrets Operator is also
# matched explicitly; its HelmRelease remains digest-pinned, and this audit rule
# can be promoted after upstream signature discovery is proven.
#
# Sigstore reachability was proven during the Step 47 investigation; the
# remaining Cilium/Kyverno audit posture is a signature-format limitation, not
# an egress issue. webhookConfiguration.failurePolicy is set to Ignore so
# webhook/network errors remain non-blocking while signature failures from a
# reachable webhook report or enforce according to each rule's failureAction.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Verify Image Signatures (Scoped)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Keyless cosign signature verification for Flux, Cilium, Kyverno, Vault
      Secrets Operator, nwarila-platform, and the-hero-wars-guys images.
      Enforces nwarila-platform and the-hero-wars-guys signatures while
      auditing the other families until they can be safely enforced by Kyverno
      admission.
spec:
  validationFailureAction: Audit
  background: true
  webhookConfiguration:
    failurePolicy: Ignore
  rules:
    - name: verify-flux-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/fluxcd/*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/fluxcd/.+/\\.github/workflows/.+@refs/.+$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-cilium-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "quay.io/cilium/*"
          # Cilium signs the release/operator/relay/clustermesh images, but
          # these helper/UI image families are not discoverably signed. Revisit
          # on every Cilium chart bump or if upstream starts signing them.
          skipImageReferences:
            - "quay.io/cilium/certgen:*"
            - "quay.io/cilium/certgen@sha256:*"
            - "quay.io/cilium/hubble-ui-backend:*"
            - "quay.io/cilium/hubble-ui-backend@sha256:*"
            - "quay.io/cilium/hubble-ui:*"
            - "quay.io/cilium/hubble-ui@sha256:*"
            - "quay.io/cilium/startup-script:*"
            - "quay.io/cilium/startup-script@sha256:*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/cilium/(cilium/\\.github/workflows/build-images-releases\\.yaml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+|proxy/\\.github/workflows/build-envoy-images-release-base\\.yaml@refs/heads/v[0-9]+\\.[0-9]+)$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-kyverno-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/kyverno/kyverno:v1.18.1"
            - "ghcr.io/kyverno/kyvernopre:v1.18.1"
            - "ghcr.io/kyverno/kyverno-cli:v1.18.1"
            - "ghcr.io/kyverno/background-controller:v1.18.1"
            - "ghcr.io/kyverno/cleanup-controller:v1.18.1"
            - "ghcr.io/kyverno/reports-controller:v1.18.1"
          repository: "ghcr.io/kyverno/signatures"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/kyverno/kyverno/\\.github/workflows/release\\.yaml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-vault-secrets-operator-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "hashicorp/vault-secrets-operator:*"
            - "hashicorp/vault-secrets-operator@sha256:*"
            - "docker.io/hashicorp/vault-secrets-operator:*"
            - "docker.io/hashicorp/vault-secrets-operator@sha256:*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/hashicorp/vault-secrets-operator/\\.github/workflows/.+@refs/(heads/main|tags/v.*)$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-nwarila-platform-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/nwarila-platform/*"
          failureAction: Enforce
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/nwarila-platform/.+/\\.github/workflows/.+@refs/(heads/main|tags/v.*)$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-herowars-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/the-hero-wars-guys/*"
          imageRegistryCredentials:
            allowInsecureRegistry: false
            secrets:
              - ghcr-pull
          failureAction: Enforce
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/the-hero-wars-guys/.+/\\.github/workflows/.+@refs/(heads/main|tags/v.*)$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
