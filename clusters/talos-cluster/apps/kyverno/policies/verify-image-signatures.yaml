# ClusterPolicy: verify-image-signatures
#
# Audit-only cosign signature verification for third-party image families. Flux,
# Cilium, Kyverno, and Vault Secrets Operator use keyless rules; cert-manager
# uses a distinct static-key rule because it signs with a static KMS key, SHA-512
# signatures, and no Rekor transparency-log entry. First-party nwarila,
# nwarila-platform, and the-hero-wars-guys images live in
# verify-image-signatures-enforced.yaml so their webhook can fail closed without
# making Audit-only third-party image families part of the admission availability
# boundary.
#
# webhookConfiguration.failurePolicy intentionally remains Ignore here. These
# rules are Audit-only deferrals until TD-0001 provides mirror-and-re-sign
# coverage. Failing closed over them would make cluster-wide pod creation depend
# on Kyverno and third-party signature/registry reachability while buying no
# enforcement outcome from the rules themselves.
#
# Cilium is matched at the image-family level so signed release digest rotation
# does not require policy churn; known unsigned helper families are skipped
# explicitly. See ADR-0010.
#
# Scope: Flux, Cilium, Kyverno, Vault Secrets Operator, and cert-manager image
# families.
# Longhorn, registry.k8s.io, first-party GHCR images, and other image families
# are out of scope for this policy; they fall through here because their
# registries are not listed in imageReferences. Kyverno release images are
# verified from GHCR because the reg.kyverno.io v1.18.1 mirrors do not expose
# discoverable cosign signatures. Kyverno component signatures live in the
# upstream shared signature repository, not co-located with each component
# image. Vault Secrets Operator is matched explicitly; its HelmRelease remains
# digest-pinned, and this audit rule can be promoted after upstream signature
# discovery is proven.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Verify Image Signatures (Scoped)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Cosign signature verification for Flux, Cilium, Kyverno, Vault Secrets
      Operator, and cert-manager images. Flux, Cilium, Kyverno, and Vault
      Secrets Operator use keyless attestors; cert-manager uses a static-key
      attestor. These third-party families remain Audit-only until TD-0001
      provides owned mirror-and-re-sign coverage.
spec:
  validationFailureAction: Audit
  background: true
  webhookConfiguration:
    failurePolicy: Ignore
  rules:
    - name: verify-flux-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/fluxcd/*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/fluxcd/.+/\\.github/workflows/.+@refs/.+$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-cilium-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "quay.io/cilium/*"
          # Cilium signs the release/operator/relay/clustermesh images, but
          # these helper/UI image families are not discoverably signed. Revisit
          # on every Cilium chart bump or if upstream starts signing them.
          skipImageReferences:
            - "quay.io/cilium/certgen:*"
            - "quay.io/cilium/certgen@sha256:*"
            - "quay.io/cilium/hubble-ui-backend:*"
            - "quay.io/cilium/hubble-ui-backend@sha256:*"
            - "quay.io/cilium/hubble-ui:*"
            - "quay.io/cilium/hubble-ui@sha256:*"
            - "quay.io/cilium/startup-script:*"
            - "quay.io/cilium/startup-script@sha256:*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/cilium/(cilium/\\.github/workflows/build-images-releases\\.yaml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+|proxy/\\.github/workflows/build-envoy-images-release-base\\.yaml@refs/heads/v[0-9]+\\.[0-9]+)$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-kyverno-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/kyverno/kyverno:v1.18.1"
            - "ghcr.io/kyverno/kyvernopre:v1.18.1"
            - "ghcr.io/kyverno/kyverno-cli:v1.18.1"
            - "ghcr.io/kyverno/background-controller:v1.18.1"
            - "ghcr.io/kyverno/cleanup-controller:v1.18.1"
            - "ghcr.io/kyverno/reports-controller:v1.18.1"
          repository: "ghcr.io/kyverno/signatures"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/kyverno/kyverno/\\.github/workflows/release\\.yaml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-vault-secrets-operator-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "hashicorp/vault-secrets-operator:*"
            - "hashicorp/vault-secrets-operator@sha256:*"
            - "docker.io/hashicorp/vault-secrets-operator:*"
            - "docker.io/hashicorp/vault-secrets-operator@sha256:*"
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "^https://github\\.com/hashicorp/vault-secrets-operator/\\.github/workflows/.+@refs/(heads/main|tags/v.*)$"
                    rekor:
                      url: "https://rekor.sigstore.dev"
    - name: verify-cert-manager-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            # Scope to cert-manager component images without over-matching Jetstack.
            - "quay.io/jetstack/cert-manager-*"
          # Audit-only and required: unsigned images become findings, not webhook blocks.
          failureAction: Audit
          mutateDigest: false
          required: true
          attestors:
            - entries:
                # Static KMS key, SHA-512 signatures, and no Rekor tlog.
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAsZZKaaIRjOpzbiWYIDKO
                      yry9XGBqAfve1iOGmt5VO1jpjNoEseT6zewozHfWTM7osxayy2WjN8G+QV39MlT3
                      Vxo91/31g+Zcq8KcvxG+iB8GRaD9pNgLmghorv+eYDiPYMO/+fhsLImyG5WEoPct
                      MeCBD7umZ/A2t96U9DQxVDqQbTHlsNludno1p1wsgRnfUM3QHexNljDvJg5FcDMo
                      dCpVLpRNvbw0lbJVfybJ4siJ5o/MmXzy0QCJpw+yMIqvqMc8qgKJ1yooJtuTVF4t
                      4/luP+EG/oVIiSWCFeRMqYdbJ3R+CJi+4LN7vFNYQM1Q/NwOB52RteaR7wnqmcBz
                      qSYK32MM8xdPCQ5tioWwnPTRbPZuzsZsRmJsKBO9JUrBYdDntZX1xY5g4QNSufxi
                      QgJgJSU7E4VGMvagEzB1JzvOr6A/qNFCO1Z6JsA3jw3cJLV1rSHfxqfSXBACTLDf
