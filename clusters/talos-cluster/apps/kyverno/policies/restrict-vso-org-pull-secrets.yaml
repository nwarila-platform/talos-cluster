# ClusterPolicy: restrict-vso-org-pull-secrets
#
# Admission guard for the VSO org-pull model. This is validate-only by design:
# it constrains pointer CRs and blocks tenant-local auth objects without adding
# any Secret-writing RBAC to Kyverno.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-vso-org-pull-secrets
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Restrict VSO org-pull Secret pointers
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: VaultStaticSecret,VaultAuth,VaultConnection
    policies.kyverno.io/description: >-
      Constrains VaultStaticSecret org-pull pointers to the platform VaultAuth
      set and blocks tenant namespaces from creating their own VaultAuth or
      VaultConnection resources.
spec:
  validationFailureAction: Enforce
  background: false
  webhookConfiguration:
    failurePolicy: Fail
  rules:
    - name: require-platform-org-pull-vaultstaticsecret-shape
      match:
        any:
          - resources:
              kinds:
                - secrets.hashicorp.com/v1beta1/VaultStaticSecret
              operations:
                - CREATE
                - UPDATE
      exclude:
        any:
          - clusterRoles:
              - cluster-admin
      validate:
        message: >-
          VaultStaticSecret pointers must use either the platform org-pull
          VaultAuth and platform/org-pull/<org>/ path prefix, or the platform
          tenant VaultAuth and the namespace-bound provisioned/source-auth path.
        deny:
          conditions:
            any:
              - key: "{{ (request.object.spec.mount || '') == 'secret' && (request.object.spec.type || '') == 'kv-v2' && ((regex_match('^platform/org-pull/[a-z0-9-]+/.+', request.object.spec.path || '') && regex_match('^vault-secrets-operator/org-pull-[a-z0-9-]+$', request.object.spec.vaultAuthRef || '')) || ((request.object.spec.path || '') == join('/', [request.namespace || '', 'provisioned/source-auth']) && (request.object.spec.vaultAuthRef || '') == 'vault-secrets-operator/tenant')) }}"
                operator: Equals
                value: false
    - name: deny-tenant-vaultauth-vaultconnection
      match:
        any:
          - resources:
              kinds:
                - secrets.hashicorp.com/v1beta1/VaultAuth
                - secrets.hashicorp.com/v1beta1/VaultConnection
              namespaceSelector:
                matchLabels:
                  nwarila.io/tenant: "true"
              operations:
                - CREATE
                - UPDATE
                - DELETE
      exclude:
        any:
          - clusterRoles:
              - cluster-admin
      validate:
        message: >-
          Tenant namespaces must use platform-owned VaultAuth and
          VaultConnection resources.
        deny:
          conditions:
            any:
              - key: "{{ request.operation }}"
                operator: AnyIn
                value:
                  - CREATE
                  - UPDATE
                  - DELETE
