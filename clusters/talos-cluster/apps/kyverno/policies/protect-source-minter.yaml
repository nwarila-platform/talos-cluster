# ClusterPolicy: protect-source-minter
#
# Defense in depth for the B-apex source rotator boundary. Flux's kustomize-controller
# may create, mutate, and delete these objects; so may any principal bound to
# cluster-admin (both are in every rule's `exclude`). This policy therefore raises
# the bar against non-platform actors - it is NOT a control against a cluster-admin.
#
# Scope is WILDCARD (source-rotator-*), not an enumerated name list. Enumerating
# names is a known failure mode here: onboarding the nwp org added a second
# rotator that an enumerated policy would not have covered, and renaming the
# script ConfigMap would have left the old rule pointing at a name that no
# longer exists - protection silently lost with nothing failing.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: protect-source-minter
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Protect Source Minter Boundary
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: ServiceAccount,ClusterRole,ClusterRoleBinding,CronJob,ConfigMap
    policies.kyverno.io/description: >-
      Blocks non-platform actors from creating, mutating, or deleting ANY
      per-org source rotator identity, RBAC, schedule, or the shared script.
      Names are matched by the source-rotator-* wildcard deliberately: an
      enumerated list silently leaves each newly onboarded org unprotected.
spec:
  validationFailureAction: Enforce
  background: false
  webhookConfiguration:
    failurePolicy: Fail
  rules:
    - name: deny-non-platform-source-minter-serviceaccount-mutation
      match:
        any:
          - resources:
              kinds:
                - ServiceAccount
              names:
                - source-rotator-*
              namespaces:
                - source-rotator
              operations:
                - CREATE
                - UPDATE
                - DELETE
      exclude:
        any:
          - subjects:
              - kind: ServiceAccount
                name: kustomize-controller
                namespace: flux-system
          - clusterRoles:
              - cluster-admin
      validate:
        message: >-
          Per-org source-rotator ServiceAccounts are platform-owned.
        deny:
          conditions:
            any:
              - key: "{{ request.operation }}"
                operator: AnyIn
                value:
                  - CREATE
                  - UPDATE
                  - DELETE
    - name: deny-non-platform-source-minter-workload-mutation
      match:
        any:
          - resources:
              kinds:
                - CronJob
              names:
                - source-rotator-*
              namespaces:
                - source-rotator
              operations:
                - CREATE
                - UPDATE
                - DELETE
          - resources:
              kinds:
                - ConfigMap
              names:
                # The minter script AND the Vault trust anchor it mounts. vault-ca is
                # load-bearing: swap that CA and the minter's TLS connection to Vault can
                # be intercepted, yielding its Vault token and the org App key it reads.
                # Protecting the script while leaving its trust anchor writable would be a
                # hole in the same boundary. Namespace-scoped, so the identically-named
                # ConfigMaps in dr-backup and the tenant namespaces are unaffected.
                - source-rotator-script
                - vault-ca
              namespaces:
                - source-rotator
              operations:
                - CREATE
                - UPDATE
                - DELETE
      exclude:
        any:
          - subjects:
              - kind: ServiceAccount
                name: kustomize-controller
                namespace: flux-system
          - clusterRoles:
              - cluster-admin
      validate:
        message: >-
          The source-minter workload and script are platform-owned.
        deny:
          conditions:
            any:
              - key: "{{ request.operation }}"
                operator: AnyIn
                value:
                  - CREATE
                  - UPDATE
                  - DELETE
    - name: deny-non-platform-source-minter-rbac-mutation
      match:
        any:
          - resources:
              kinds:
                - ClusterRole
                - ClusterRoleBinding
              names:
                - source-rotator-*
              operations:
                - CREATE
                - UPDATE
                - DELETE
      exclude:
        any:
          - subjects:
              - kind: ServiceAccount
                name: kustomize-controller
                namespace: flux-system
          - clusterRoles:
              - cluster-admin
      validate:
        message: >-
          The source-minter ClusterRole and ClusterRoleBinding are
          platform-owned.
        deny:
          conditions:
            any:
              - key: "{{ request.operation }}"
                operator: AnyIn
                value:
                  - CREATE
                  - UPDATE
                  - DELETE
