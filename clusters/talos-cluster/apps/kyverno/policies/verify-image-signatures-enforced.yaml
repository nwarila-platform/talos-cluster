# ClusterPolicy: verify-image-signatures-enforced
#
# ⚠️ NON-BLOCKING (Audit) BY DESIGN — and it is NOT slated to return to Enforce.
# First-party admission enforcement moved to the merged ImageValidatingPolicy
# resource (enforcing at [Deny]/Fail since #340; transiently at [Audit]/Ignore
# for the merge-cutover canary step, flipped back by the follow-up PR); this
# legacy ClusterPolicy stays Audit and guard-pinned until the retire-legacy PR
# (PR-C2) removes it. Its
# original blocker (online-Rekor on the admission path) was fixed by the offline
# pins below, so "waiting on offline verification" no longer applies.
# Root cause of the 2026-07-14 brick: keyless verification against `rekor.url` made
# an ONLINE Rekor transparency-log query on the admission hot path, and a Rekor
# outage window fail-closed first-party pod creation (Vault + the hwg tenant).
# FIX (this change): the three first-party keyless attestors now verify OFFLINE —
# the embedded cosign bundle SET is checked against a pinned Rekor public key
# (rekor.pubkey). `rekor.url` is KEPT (Kyverno v1.18.2's policy-validation webhook
# REJECTS a keyless attestor without a non-empty rekor.url — "An URL is required" —
# so it cannot be omitted), but with a pinned pubkey and the embedded bundle present
# Kyverno verifies the SET offline via VerifyBundle and the RekorClient(url) is a
# DEAD FALLBACK reached only if a signature lacks a bundle (ours never do) — so no
# online Rekor GET on the admission path. (ctlog has no url field — pubkey only.)
# The Fulcio leaf chain is checked against pinned `roots` (Sigstore root +
# intermediate), and the Fulcio SCT against a pinned CTFE key (ctlog.pubkey).
# The offline behavior is established by the Kyverno/cosign code path. NOTE: this header
# once gated the flip on a live kyverno->rekor egress-blackhole canary. There is NO
# RECORD in this repo of that canary having been run, and the flip proceeded via the
# IVPs (#340) regardless. Treat that gate as UNMET rather than satisfied.
# ignoreTlog / ignoreSCT stay FALSE, so the tlog + SCT security properties are fully
# preserved; the pins remove the Sigstore/Rekor/Fulcio/CTFE/TUF online dependency
# from the admission path entirely — the exact 2026-07-14 brick vector, eliminated.
# The pins are Sigstore public-good keys that rotate on Sigstore's schedule. The
# single-valued-pin residual is a stale pin fail-closing a NEW post-rotation signature.
# ⚠️ CORRECTED 2026-07-18: this header previously bounded that residual with "this
# policy stays non-blocking Audit, so a stale pin surfaces only as a PolicyReport
# fail, never a brick". THAT NO LONGER HOLDS. All four pinned PEMs here are
# content-identical to the pins in the merged ImageValidatingPolicy resource, whose
# steady-state posture is [Deny]/failurePolicy:Fail (since #340; transiently
# [Audit]/Ignore during the merge-cutover canary step) — so a stale pin WOULD deny
# first-party pod admission, not merely report. This policy being Audit bounds nothing.
# The sigstore-TUF-root drift-watcher IS built (scripts/check-sigstore-pin-verification.py,
# #334) and wired into CI. Two caveats: it inspects the LEGACY ClusterPolicy only (a
# sound proxy, since these four pins are byte-identical in the enforcing IVP), and its
# live daily detector runs in the kubescape workflow whose kubectl fetch has been failing
# (runner->dl.k8s.io egress) — so treat RUNTIME drift detection as unproven until that is
# confirmed restored. Sigstore rotations are rare (Rekor key stable since
# 2021, Fulcio root valid to 2031). The pins are mirrored in
# scripts/check-image-signature-enforcement.py (CANONICAL_FIRST_PARTY_ATTESTORS),
# which the guard exact-matches. This policy is NOT restored to Enforce — it is
# retired by PR-C2. Tracked in vault_live_admin_lockout / cp1_offline_verify_decision.
#
# Original CP-1 fail-closed rationale (HISTORICAL — retained for the reasoning, not
# a restore target; first-party enforcement now lives on the IVPs):
# Fail-closed cosign keyless signature verification for first-party images.
# Owner decision 2026-07-13: fail closed for first-party images everywhere the
# Kyverno admission webhook applies, including deploy-vault. With the offline pins
# above, Sigstore/Rekor/Fulcio/CTFE/TUF are NO LONGER on the admission path, so the
# residual availability tradeoff at Enforce is narrowed to: while Kyverno itself or
# GHCR (the image + signature layers) is unreachable, first-party pods cannot be
# created or restarted; running pods are unaffected because admission is create-time.
#
# Superset invariant: the matchConditions CEL must match a superset of every
# imageReferences glob below. If an enforced image can match Kyverno's
# verifyImages glob but not this API-server CEL, the API server never calls the
# fail-closed webhook and the image is admitted unverified.
#
# Real trap: a failurePolicy: Fail policy with empty matchConditions falls into
# Kyverno's shared cluster-wide fail webhook for mutate or verifyImages rules.
# That would make pod admission in every non-excluded namespace depend on
# Kyverno reachability. Non-empty matchConditions make Kyverno create a
# dedicated fine-grained webhook for this policy instead.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures-enforced
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Verify Image Signatures (First-Party Enforced)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Fail-closed keyless cosign signature verification for first-party
      nwarila, nwarila-platform, and the-hero-wars-guys images, scoped by
      API-server matchConditions so unrelated pods do not enter this
      availability boundary.
spec:
  validationFailureAction: Audit # PERMANENT (retired by PR-C2, NOT restored) — see header
  background: true
  webhookConfiguration:
    failurePolicy: Ignore # PERMANENT (retired by PR-C2, NOT restored) — see header
    timeoutSeconds: 30
    matchConditions:
      - name: first-party-image-present
        expression: >-
          object != null && (
            (has(object.spec.containers) && object.spec.containers.exists(c,
              c.image.startsWith('ghcr.io/nwarila/') ||
              c.image.startsWith('ghcr.io/nwarila-platform/') ||
              c.image.startsWith('ghcr.io/the-hero-wars-guys/'))) ||
            (has(object.spec.initContainers) && object.spec.initContainers.exists(c,
              c.image.startsWith('ghcr.io/nwarila/') ||
              c.image.startsWith('ghcr.io/nwarila-platform/') ||
              c.image.startsWith('ghcr.io/the-hero-wars-guys/'))) ||
            (has(object.spec.ephemeralContainers) && object.spec.ephemeralContainers.exists(c,
              c.image.startsWith('ghcr.io/nwarila/') ||
              c.image.startsWith('ghcr.io/nwarila-platform/') ||
              c.image.startsWith('ghcr.io/the-hero-wars-guys/')))
          )
