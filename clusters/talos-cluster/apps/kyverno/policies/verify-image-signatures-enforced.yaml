# ClusterPolicy: verify-image-signatures-enforced
#
# ⚠️ STILL INTERIM AUDIT in THIS change (offline verification now configured; the
# Enforce/Fail flip is the next PR — this one lands the offline config as a live
# canary and proves it via PolicyReports before anything blocks).
# Root cause of the 2026-07-14 brick: keyless verification against `rekor.url` made
# an ONLINE Rekor transparency-log query on the admission hot path, and a Rekor
# outage window fail-closed first-party pod creation (Vault + the hwg tenant).
# FIX (this change): the three first-party keyless attestors now verify OFFLINE —
# the embedded cosign bundle SET is checked against a pinned Rekor public key
# (rekor.pubkey, with `rekor.url` REMOVED so Kyverno creates no RekorClient / makes
# no online GET), the Fulcio leaf chain against pinned `roots` (Sigstore root +
# intermediate), and the Fulcio SCT against a pinned CTFE key (ctlog.pubkey).
# ignoreTlog / ignoreSCT stay FALSE, so the tlog + SCT security properties are fully
# preserved; the pins remove the Sigstore/Rekor/Fulcio/CTFE/TUF online dependency
# from the admission path entirely — the exact 2026-07-14 brick vector, eliminated.
# The pins are Sigstore public-good keys that rotate on Sigstore's schedule; the
# single-valued-pin residual (a stale pin fail-closing a NEW post-rotation signature)
# is engineered out by the sigstore-TUF-root drift-watcher (opens a bump PR before a
# rotation bites). The pins are mirrored in scripts/check-image-signature-enforcement.py
# (CANONICAL_FIRST_PARTY_ATTESTORS) which the guard exact-matches. RESTORE fail-closed
# (failureAction: Enforce, failurePolicy: Fail, guard FIRST_PARTY_ENFORCEMENT_MODE) in
# the next PR, once the Audit canary proves first-party PolicyReports PASS offline.
# Tracked in vault_live_admin_lockout / cp1_offline_verify_decision.
#
# Original CP-1 fail-closed rationale (restore target):
# Fail-closed cosign keyless signature verification for first-party images.
# Owner decision 2026-07-13: fail closed for first-party images everywhere the
# Kyverno admission webhook applies, including deploy-vault. With the offline pins
# above, Sigstore/Rekor/Fulcio/CTFE/TUF are NO LONGER on the admission path, so the
# residual availability tradeoff at Enforce is narrowed to: while Kyverno itself or
# GHCR (the image + signature layers) is unreachable, first-party pods cannot be
# created or restarted; running pods are unaffected because admission is create-time.
#
# Superset invariant: the matchConditions CEL must match a superset of every
# imageReferences glob below. If an enforced image can match Kyverno's
# verifyImages glob but not this API-server CEL, the API server never calls the
# fail-closed webhook and the image is admitted unverified.
#
# Real trap: a failurePolicy: Fail policy with empty matchConditions falls into
# Kyverno's shared cluster-wide fail webhook for mutate or verifyImages rules.
# That would make pod admission in every non-excluded namespace depend on
# Kyverno reachability. Non-empty matchConditions make Kyverno create a
# dedicated fine-grained webhook for this policy instead.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures-enforced
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Verify Image Signatures (First-Party Enforced)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Fail-closed keyless cosign signature verification for first-party
      nwarila, nwarila-platform, and the-hero-wars-guys images, scoped by
      API-server matchConditions so unrelated pods do not enter this
      availability boundary.
spec:
  validationFailureAction: Audit # INTERIM (restore: Enforce) — see header
  background: true
  webhookConfiguration:
    failurePolicy: Ignore # INTERIM (restore: Fail) — see header
    timeoutSeconds: 30
    matchConditions:
      - name: first-party-image-present
        expression: >-
          object != null && (
            (has(object.spec.containers) && object.spec.containers.exists(c,
              c.image.startsWith('ghcr.io/nwarila/') ||
              c.image.startsWith('ghcr.io/nwarila-platform/') ||
              c.image.startsWith('ghcr.io/the-hero-wars-guys/'))) ||
            (has(object.spec.initContainers) && object.spec.initContainers.exists(c,
              c.image.startsWith('ghcr.io/nwarila/') ||
              c.image.startsWith('ghcr.io/nwarila-platform/') ||
              c.image.startsWith('ghcr.io/the-hero-wars-guys/'))) ||
            (has(object.spec.ephemeralContainers) && object.spec.ephemeralContainers.exists(c,
              c.image.startsWith('ghcr.io/nwarila/') ||
              c.image.startsWith('ghcr.io/nwarila-platform/') ||
              c.image.startsWith('ghcr.io/the-hero-wars-guys/')))
          )
