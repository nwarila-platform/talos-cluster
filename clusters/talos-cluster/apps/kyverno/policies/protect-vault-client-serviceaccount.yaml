# ClusterPolicy: protect-vault-client-serviceaccount
#
# Defense in depth for the zero-touch tenant model. Tenant namespaces include a
# platform-owned vault-client ServiceAccount. Tenants may bind workloads to it,
# but must not create, update, patch, or delete that ServiceAccount.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: protect-vault-client-serviceaccount
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Protect vault-client ServiceAccount
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: ServiceAccount
    policies.kyverno.io/description: >-
      Blocks non-platform actors from creating, mutating, or deleting the
      platform-owned vault-client ServiceAccount in tenant namespaces.
spec:
  validationFailureAction: Enforce
  background: false
  webhookConfiguration:
    failurePolicy: Fail
  rules:
    - name: deny-non-platform-vault-client-serviceaccount-mutation
      match:
        any:
          - resources:
              kinds:
                - ServiceAccount
              names:
                - vault-client
              namespaceSelector:
                matchLabels:
                  nwarila.io/tenant: "true"
              operations:
                - CREATE
                - UPDATE
                - DELETE
      exclude:
        any:
          - subjects:
              - kind: ServiceAccount
                name: kustomize-controller
                namespace: flux-system
          - clusterRoles:
              - cluster-admin
      validate:
        message: >-
          vault-client ServiceAccounts in tenant namespaces are platform-owned.
          Tenants may bind workloads to the ServiceAccount, but may not create,
          mutate, or delete it.
        deny:
          conditions:
            any:
              - key: "{{ request.operation }}"
                operator: AnyIn
                value:
                  - CREATE
                  - UPDATE
                  - DELETE
