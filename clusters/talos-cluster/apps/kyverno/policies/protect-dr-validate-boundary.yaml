# ClusterPolicy: protect-dr-validate-boundary
#
# RUNTIME (admission) backstop for the DR restore-validator boundary — the authoritative layer of the
# defense-in-depth model chosen for this slice. It validates the ACTUALLY-APPLIED object (after Flux
# spec.postBuild/spec.components substitution and after Helm chart templating), closing the class the static
# CI guard (scripts/check-vault-restore-validator-boundaries.sh) structurally cannot see: the rendered git
# manifest != the applied cluster object.
#
# DESIGN: deliberately does NOT exclude the Flux controllers. The threat is Flux/Helm applying malicious
# CONTENT (a poisoned commit, a postBuild substitution, a chart-templated binding), so every rule is
# CONTENT-based — legit resources pass on their content, malicious ones fail regardless of who applies them.
#
# RESIDUALS: these remain enforced by the git-declared CI guard, not by this runtime policy, to stay false-positive
# safe against Helm-rendered platform objects Kyverno admission sees but the static app render does not:
#   - cluster-wide destructive Longhorn Role/ClusterRole hygiene (Longhorn Helm controller RBAC is broad);
#   - broad MutatingWebhookConfiguration / ValidatingWebhookConfiguration denial (Kyverno owns webhooks);
#   - wildcard closed-world admission for dr-validate (background/wildcard restrictions and Event false positives).
#   - impersonation via broad roles: rule 6 flags only the LITERAL 'impersonate' verb (see its comment), so a role with
#     wildcard verbs:[*] over serviceaccounts (cluster-admin, admin/edit, longhorn, crd-controller-flux-system, ...) is
#     impersonation-capable but NOT denied at runtime — flagging verbs:[*] would false-positive on every broad platform
#     role. Preventing unapproved grants of such roles is generic RBAC hardening covered by the git-declared CI guard,
#     out of scope here. Rules 2-3 still deny bindings that name the guarded SAs/roles directly.
#
# !!! SHIPS IN AUDIT MODE. Validated offline with the kyverno CLI v1.18.2 (matches cluster app version): 13 attack
# objects FAIL (un-suspended/rewritten CronJob, guarded-SA/-role bindings, impersonate role, data-vault fromBackup
# Volume, arbitrary workload, SA-token Secret, destructive RecurringJob, weakened approved-VAP, driver-selecting CCNP).
# A live 272-object RBAC soak found built-in false positives in rules 3/6 and a name-only approved-binding exemption
# gap in rules 2/3; these are fixed with a built-in impersonate allowlist, a trivial-built-in-ClusterRole roleRef
# exemption, and an exact-approved-binding shape check aligned with the CI guard. Still, before flipping validationFailureAction
# to Enforce and failurePolicy to Fail:
#   1. Soak in Audit ON THE CLUSTER; inspect PolicyReports for false-positives on real live applies (the offline set
#      cannot cover every operator/controller object).
#   2. Re-run the offline check: `podman run --rm --user 0 -v <dir>:/work -w /work ghcr.io/kyverno/kyverno-cli:v1.18.2
#      apply /work/protect-dr-validate-boundary.yaml --resource /work/<fixture>` (approved PASS, attacks FAIL).
#      (v1.18.2 CLI re-validation confirmed on the v1.18.1->v1.18.2 bump: approved PASS, all attack fixtures FAIL.)
#   3. A buggy Enforce+Fail rule would BLOCK legit Flux reconciliation cluster-wide, so do not skip the soak.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: protect-dr-validate-boundary
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Protect DR restore-validator boundary (runtime backstop)
    policies.kyverno.io/category: Disaster Recovery
    policies.kyverno.io/severity: critical
    policies.kyverno.io/subject: CronJob, RoleBinding, Volume, Pod
    policies.kyverno.io/description: >-
      Runtime admission backstop for the DR restore-validator. Validates the real
      applied object (post Flux/Helm) to close what the static CI guard cannot see:
      un-suspending or rewriting the driver CronJob, binding the guarded restore-driver
      ServiceAccounts, running arbitrary code as them, and restoring the live data-vault
      backup into a Longhorn Volume. Ships in Audit — soak then Enforce.
spec:
  validationFailureAction: Audit          # TODO: -> Enforce after Audit soak (see header)
  background: false                        # A background:true soak (PR #225) confirmed the non-RBAC rules pass on live objects, but Kyverno background scan EXCLUDES RBAC here (default resourceFilters), so rule 6/binding rules can't be background-soaked — they're covered by admission-time eval + the CI guard + offline kyverno-CLI validation.
  webhookConfiguration:
    failurePolicy: Ignore                 # TODO: -> Fail after Audit soak confirms no legit-apply false-positives
  rules:
    # 1. The approved CronJob must stay inert (suspended) with its pinned identity/command/image. Catches the
    #    confirmed Flux spec.patches un-suspend/command-swap that the static guard cannot see.
    - name: cronjob-must-stay-suspended-and-pinned
      match:
        any:
          - resources:
              kinds: [CronJob]
              namespaces: [dr-validate]
              names: [dr-restore-driver]
              operations: [CREATE, UPDATE]
      validate:
        message: >-
          The dr-restore-driver CronJob must keep the approved inert schedule, pod template labels,
          ServiceAccount, host namespace isolation, and single pinned container. Un-suspending or rewriting the
          restore driver is forbidden; DR validation runs only under supervised manual trigger.
        deny:
          conditions:
            any:
              # Check the container count before evaluating the single-container invariants below.
              - key: "{{ length(request.object.spec.jobTemplate.spec.template.spec.containers || `[]`) }}"
                operator: NotEquals
                value: 1
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.containers[0].command || `[]` }}"
                operator: NotEquals
                value: ["/bin/bash", "/opt/vault-restore-validator/restore-driver.sh"]
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.containers[0].image || '' }}"
                operator: NotEquals
                value: "docker.io/bitnami/kubectl@sha256:558420daf32bbc382e3e9af4537f4073085b336ddd47399a3b70e70087115978"
              - key: "{{ contains(keys(request.object.spec.jobTemplate.spec.template.spec.containers[0] || `{}`), 'lifecycle') }}"
                operator: Equals
                value: true
              - key: "{{ contains(keys(request.object.spec.jobTemplate.spec.template.spec.containers[0] || `{}`), 'livenessProbe') }}"
                operator: Equals
                value: true
              - key: "{{ contains(keys(request.object.spec.jobTemplate.spec.template.spec.containers[0] || `{}`), 'readinessProbe') }}"
                operator: Equals
                value: true
              - key: "{{ contains(keys(request.object.spec.jobTemplate.spec.template.spec.containers[0] || `{}`), 'startupProbe') }}"
                operator: Equals
                value: true
              - key: "{{ contains(keys(request.object.spec.jobTemplate.spec.template.spec.containers[0] || `{}`), 'envFrom') }}"
                operator: Equals
                value: true
              - key: "{{ contains(keys(request.object.spec.jobTemplate.spec.template.spec.containers[0] || `{}`), 'args') }}"
                operator: Equals
                value: true
              - key: "{{ length(request.object.spec.jobTemplate.spec.template.spec.containers[0].env[?valueFrom.secretKeyRef] || `[]`) }}"
                operator: GreaterThan
                value: 0
              - key: "{{ request.object.spec.suspend || `false` }}"
                operator: NotEquals
                value: true
              - key: "{{ request.object.spec.schedule || '' }}"
                operator: NotEquals
                value: "0 6 31 2 *"
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.serviceAccountName || '' }}"
                operator: NotEquals
                value: dr-orchestrator
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.automountServiceAccountToken || `false` }}"
                operator: NotEquals
                value: true
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.hostNetwork || `false` }}"
                operator: Equals
                value: true
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.hostPID || `false` }}"
                operator: Equals
                value: true
              - key: "{{ request.object.spec.jobTemplate.spec.template.spec.hostIPC || `false` }}"
                operator: Equals
                value: true
              - key: "{{ length(request.object.spec.jobTemplate.spec.template.spec.initContainers || `[]`) }}"
                operator: GreaterThan
                value: 0
              - key: "{{ length(request.object.spec.jobTemplate.spec.template.spec.ephemeralContainers || `[]`) }}"
                operator: GreaterThan
                value: 0
              - key: "{{ length(keys(request.object.spec.jobTemplate.spec.template.metadata.labels || `{}`)) }}"
                operator: NotEquals
                value: 2
              - key: "{{ request.object.spec.jobTemplate.spec.template.metadata.labels.\"app.kubernetes.io/name\" || '' }}"
                operator: NotEquals
                value: vault-restore-validator
              - key: "{{ request.object.spec.jobTemplate.spec.template.metadata.labels.\"app.kubernetes.io/component\" || '' }}"
                operator: NotEquals
                value: restore-driver

    # 2. Only the approved bindings may bind the guarded restore-driver Roles. Kyverno sees the RESOLVED binding
    #    (after Flux ${VAR} substitution), closing the postBuild placeholder evasion. roleRef-keyed.
    - name: no-unapproved-binding-of-guarded-roles
      match:
        any:
          - resources:
              kinds: [RoleBinding, ClusterRoleBinding]
              operations: [CREATE, UPDATE]
      context:
        - name: isExactApprovedBinding
          variable:
            jmesPath: >-
              (request.object.kind == 'RoleBinding' && request.object.metadata.namespace == 'longhorn-system' &&
               request.object.metadata.name == 'dr-orchestrator-longhorn-restore' &&
               request.object.roleRef.apiGroup == 'rbac.authorization.k8s.io' && request.object.roleRef.kind == 'Role' &&
               request.object.roleRef.name == 'dr-orchestrator-longhorn-restore' &&
               length(request.object.subjects || `[]`) == `1` && request.object.subjects[0].kind == 'ServiceAccount' &&
               request.object.subjects[0].name == 'dr-orchestrator' && request.object.subjects[0].namespace == 'dr-validate')
              ||
              (request.object.kind == 'RoleBinding' && request.object.metadata.namespace == 'dr-validate' &&
               request.object.metadata.name == 'dr-orchestrator-result-writer' &&
               request.object.roleRef.apiGroup == 'rbac.authorization.k8s.io' && request.object.roleRef.kind == 'Role' &&
               request.object.roleRef.name == 'dr-orchestrator-result-writer' &&
               length(request.object.subjects || `[]`) == `1` && request.object.subjects[0].kind == 'ServiceAccount' &&
               request.object.subjects[0].name == 'dr-orchestrator' && request.object.subjects[0].namespace == 'dr-validate')
              ||
              (request.object.kind == 'RoleBinding' && request.object.metadata.namespace == 'dr-validate' &&
               request.object.metadata.name == 'dr-generate-root-noop' &&
               request.object.roleRef.apiGroup == 'rbac.authorization.k8s.io' && request.object.roleRef.kind == 'Role' &&
               request.object.roleRef.name == 'vault-restore-validator-noop' &&
               length(request.object.subjects || `[]`) == `1` && request.object.subjects[0].kind == 'ServiceAccount' &&
               request.object.subjects[0].name == 'dr-generate-root' && request.object.subjects[0].namespace == 'dr-validate')
            default: false
      validate:
        message: >-
          Only the approved restore-validator bindings (dr-orchestrator-longhorn-restore,
          dr-orchestrator-result-writer, dr-generate-root-noop) may reference the guarded restore-driver Roles.
        deny:
          conditions:
            all:
              - key: "{{ request.object.roleRef.name }}"
                operator: AnyIn
                value: [dr-orchestrator-longhorn-restore, dr-orchestrator-result-writer, vault-restore-validator-noop]
              - key: "{{ isExactApprovedBinding }}"
                operator: NotEquals
                value: true

    # 3. Nothing may bind the guarded restore-driver ServiceAccounts by subject (SA/User/Group) except the
    #    approved bindings. Kyverno sees the resolved subject (post-substitution).
    - name: no-unapproved-subject-reaches-guarded-sa
      match:
        any:
          - resources:
              kinds: [RoleBinding, ClusterRoleBinding]
              operations: [CREATE, UPDATE]
      validate:
        message: >-
          Only the approved restore-validator bindings may name the guarded ServiceAccounts dr-orchestrator /
          dr-generate-root (by ServiceAccount, by their User username, or by a Group that contains them).
        # Flat deny on a single precomputed boolean: kyverno-CLI v1.18.2 skips a policy that nests
        # deny.conditions (all>any>all), so the direct-OR-(group-AND-non-trivial-roleRef) logic is folded
        # into the 'violation' context variable below and denied with one condition.
        deny:
          conditions:
            all:
              - key: "{{ violation }}"
                operator: Equals
                value: true
      context:
        - name: reachesDirect
          variable:
            jmesPath: >-
              length(request.object.subjects[?
                (kind=='ServiceAccount' && (name=='dr-orchestrator' || name=='dr-generate-root')) ||
                (kind=='User' && (name=='system:serviceaccount:dr-validate:dr-orchestrator' || name=='system:serviceaccount:dr-validate:dr-generate-root'))
              ] || `[]`) > `0`
            default: false
        - name: reachesGroup
          variable:
            jmesPath: >-
              length(request.object.subjects[?
                kind=='Group' && (name=='system:serviceaccounts' || name=='system:serviceaccounts:dr-validate' || name=='system:authenticated')
              ] || `[]`) > `0`
            default: false
        - name: roleRefIsTrivialBuiltInClusterRole
          variable:
            jmesPath: >-
              request.object.roleRef.kind == 'ClusterRole' && request.object.roleRef.apiGroup == 'rbac.authorization.k8s.io' &&
              (request.object.roleRef.name == 'system:basic-user' || request.object.roleRef.name == 'system:discovery' ||
               request.object.roleRef.name == 'system:public-info-viewer' || request.object.roleRef.name == 'system:service-account-issuer-discovery')
            default: false
        - name: isExactApprovedBinding
          variable:
            jmesPath: >-
              (request.object.kind == 'RoleBinding' && request.object.metadata.namespace == 'longhorn-system' &&
               request.object.metadata.name == 'dr-orchestrator-longhorn-restore' &&
               request.object.roleRef.apiGroup == 'rbac.authorization.k8s.io' && request.object.roleRef.kind == 'Role' &&
               request.object.roleRef.name == 'dr-orchestrator-longhorn-restore' &&
               length(request.object.subjects || `[]`) == `1` && request.object.subjects[0].kind == 'ServiceAccount' &&
               request.object.subjects[0].name == 'dr-orchestrator' && request.object.subjects[0].namespace == 'dr-validate')
              ||
              (request.object.kind == 'RoleBinding' && request.object.metadata.namespace == 'dr-validate' &&
               request.object.metadata.name == 'dr-orchestrator-result-writer' &&
               request.object.roleRef.apiGroup == 'rbac.authorization.k8s.io' && request.object.roleRef.kind == 'Role' &&
               request.object.roleRef.name == 'dr-orchestrator-result-writer' &&
               length(request.object.subjects || `[]`) == `1` && request.object.subjects[0].kind == 'ServiceAccount' &&
               request.object.subjects[0].name == 'dr-orchestrator' && request.object.subjects[0].namespace == 'dr-validate')
              ||
              (request.object.kind == 'RoleBinding' && request.object.metadata.namespace == 'dr-validate' &&
               request.object.metadata.name == 'dr-generate-root-noop' &&
               request.object.roleRef.apiGroup == 'rbac.authorization.k8s.io' && request.object.roleRef.kind == 'Role' &&
               request.object.roleRef.name == 'vault-restore-validator-noop' &&
               length(request.object.subjects || `[]`) == `1` && request.object.subjects[0].kind == 'ServiceAccount' &&
               request.object.subjects[0].name == 'dr-generate-root' && request.object.subjects[0].namespace == 'dr-validate')
            default: false
        # Folded deny logic (see the flat deny above): deny when the binding is NOT the exact approved shape AND it
        # reaches a guarded SA — directly, or via a broad group bound to a non-trivial (non-built-in-discovery) role.
        - name: violation
          variable:
            jmesPath: >-
              isExactApprovedBinding == `false` &&
              (reachesDirect == `true` || (reachesGroup == `true` && roleRefIsTrivialBuiltInClusterRole == `false`))
            default: false

    # 4. Longhorn data-plane objects must not reference data-vault except the driver's fixed scratch Volume.
    #    Catches the data-plane restore path (objects applied by flux-system, which the VAP — scoped to the
    #    dr-orchestrator username — never constrains).
    - name: no-datavault-backup-restore
      match:
        any:
          - resources:
              kinds:
                - longhorn.io/v1beta2/Volume
                - longhorn.io/v1beta2/Snapshot
                - longhorn.io/v1beta2/Backup
                - longhorn.io/v1beta2/BackingImage
              operations: [CREATE, UPDATE]
      context:
        - name: referencesDataVault
          variable:
            jmesPath: >-
              contains(request.object.spec.fromBackup || '', 'data-vault') ||
              contains(to_string(request.object.spec.dataSource || ''), 'data-vault') ||
              contains(to_string(request.object.spec.backingImage || ''), 'data-vault')
            default: false
        - name: approvedScratchVolume
          variable:
            jmesPath: >-
              request.object.kind == 'Volume' &&
              request.object.metadata.name == 'dr-validate-vault-restore'
            default: false
      validate:
        message: >-
          Longhorn Volume/Snapshot/Backup/BackingImage objects may not reference live data-vault material
          except as the driver's fixed scratch Volume dr-validate-vault-restore.
        deny:
          conditions:
            all:
              - key: "{{ referencesDataVault }}"
                operator: Equals
                value: true
              - key: "{{ approvedScratchVolume }}"
                operator: NotEquals
                value: true

    # 5. Closed-world dr-validate: no runnable workload or Secret may exist in dr-validate except the approved
    #    CronJob. Catches the SA-token Secret + arbitrary workloads (incl Helm-templated / postBuild-injected).
    - name: no-unexpected-workload-or-secret-in-dr-validate
      match:
        any:
          - resources:
              kinds: [Pod, Deployment, StatefulSet, DaemonSet, ReplicaSet, ReplicationController, Job, Secret]
              namespaces: [dr-validate]
              operations: [CREATE, UPDATE]
      validate:
        message: >-
          The dr-validate namespace is closed-world: only the approved suspended CronJob dr-restore-driver
          (and the objects it owns at supervised run time) may run there. Arbitrary workloads and Secrets —
          including service-account-token Secrets — are forbidden.
        deny:
          conditions:
            all:
              # allow the CronJob-owned Job/Pod at supervised run time (ownerReference chains to dr-restore-driver)
              - key: "{{ length(request.object.metadata.ownerReferences[?name=='dr-restore-driver' || starts_with(name, 'dr-restore-driver-')] || `[]`) }}"
                operator: Equals
                value: 0

    # 6. Literal impersonate grants on identity resources can assume the guarded restore-driver identity.
    #    Tuple-scoped foreach keeps verbs/resources from the same RBAC rule together.
    - name: no-impersonate-identity
      match:
        any:
          - resources:
              kinds:
                - rbac.authorization.k8s.io/v1/Role
                - rbac.authorization.k8s.io/v1/ClusterRole
              operations: [CREATE, UPDATE]
      exclude:
        any:
          - resources:
              kinds:
                - rbac.authorization.k8s.io/v1/ClusterRole
              names: ["admin", "edit", "system:aggregate-to-edit"]
      validate:
        message: >-
          Role rules must not grant literal impersonate on users, groups, serviceaccounts, uids, or wildcard
          resources. Literal impersonation can assume the guarded restore-driver identity.
        foreach:
          - list: "request.object.rules || `[]`"
            deny:
              conditions:
                all:
                  # LITERAL impersonate only (contains(), not AnyIn — AnyIn treats a role's verbs:[*] / resources:[*]
                  # as a wildcard and false-positives on Flux/Longhorn broad-* platform roles). verbs:[*] parity is
                  # a documented CI-only residual.
                  - key: "{{ contains(element.verbs || `[]`, 'impersonate') }}"
                    operator: Equals
                    value: true
                  - key: "{{ length((element.resources || `[]`)[?@ == 'users' || @ == 'groups' || @ == 'serviceaccounts' || @ == 'uids' || @ == '*']) }}"
                    operator: GreaterThan
                    value: 0

    # 7. Only the approved Longhorn backup RecurringJobs are allowed; destructive or extra tasks are denied.
    #    Approved: vault-daily-backup (Vault PVC, ADR-0021/0022) and etcd-daily-backup (etcd snapshot
    #    volume, ADR-0006 Stage-1 retarget). Both must keep spec.task: backup. Mirrored by
    #    APPROVED_LONGHORN_DATAPLANE in the static CI guard.
    - name: no-unapproved-longhorn-recurringjob
      match:
        any:
          - resources:
              kinds: [longhorn.io/v1beta2/RecurringJob]
              operations: [CREATE, UPDATE]
      validate:
        message: >-
          The only approved Longhorn RecurringJobs are vault-daily-backup and etcd-daily-backup,
          each with spec.task: backup.
        deny:
          conditions:
            any:
              - key: "{{ request.object.metadata.name }}"
                operator: NotIn
                value:
                  - vault-daily-backup
                  - etcd-daily-backup
              - key: "{{ request.object.spec.task || '' }}"
                operator: NotEquals
                value: backup

    # 8. The API-server-native VAP/B guarding dr-orchestrator Longhorn Volume creates must not be weakened.
    - name: approved-vap-integrity
      match:
        any:
          - resources:
              kinds:
                - admissionregistration.k8s.io/v1/ValidatingAdmissionPolicy
                - admissionregistration.k8s.io/v1/ValidatingAdmissionPolicyBinding
              names: [dr-orchestrator-longhorn-volume-allowlist]
              operations: [CREATE, UPDATE]
      context:
        - name: vapPolicyWeak
          variable:
            jmesPath: >-
              request.object.kind == 'ValidatingAdmissionPolicy' &&
              (
                request.object.spec.failurePolicy != 'Fail' ||
                length(request.object.spec.matchConditions || `[]`) != `1` ||
                request.object.spec.matchConditions[0].expression != 'request.userInfo.username == \'system:serviceaccount:dr-validate:dr-orchestrator\'' ||
                contains(request.object.spec.validations[].expression || `[]`, 'object.metadata.name == \'dr-validate-vault-restore\'') == `false` ||
                contains(request.object.spec.validations[].expression || `[]`, 'object.spec.numberOfReplicas <= 1') == `false`
              )
            default: false
        - name: vapBindingWeak
          variable:
            jmesPath: >-
              request.object.kind == 'ValidatingAdmissionPolicyBinding' &&
              (
                request.object.spec.policyName != 'dr-orchestrator-longhorn-volume-allowlist' ||
                length(request.object.spec.validationActions || `[]`) != `1` ||
                request.object.spec.validationActions[0] != 'Deny' ||
                request.object.spec.matchResources != `null` ||
                request.object.spec.paramRef != `null`
              )
            default: false
      validate:
        message: >-
          The approved dr-orchestrator Longhorn Volume VAP and binding must keep Fail/Deny behavior,
          the dr-orchestrator match condition, the scratch-name and replica validations, and no binding
          matchResources or paramRef.
        deny:
          conditions:
            any:
              - key: "{{ vapPolicyWeak }}"
                operator: Equals
                value: true
              - key: "{{ vapBindingWeak }}"
                operator: Equals
                value: true

    # 9. Clusterwide Cilium egress policy must not select the restore-driver labels.
    #    The approved driver egress policy is namespaced CiliumNetworkPolicy, not CCNP.
    - name: no-driver-ccnp-egress
      match:
        any:
          - resources:
              kinds: [cilium.io/v2/CiliumClusterwideNetworkPolicy]
              operations: [CREATE, UPDATE]
      validate:
        message: >-
          CiliumClusterwideNetworkPolicy egress rules must not select restore-driver pods by
          app.kubernetes.io/name or app.kubernetes.io/component labels.
        foreach:
          - list: "[request.object.spec]"
            deny:
              conditions:
                all:
                  - key: "{{ length(element.egress || `[]`) }}"
                    operator: GreaterThan
                    value: 0
                  - key: "{{ (element.endpointSelector.matchLabels.\"app.kubernetes.io/name\" || '') == 'vault-restore-validator' || (element.endpointSelector.matchLabels.\"k8s:app.kubernetes.io/name\" || '') == 'vault-restore-validator' || (element.endpointSelector.matchLabels.\"app.kubernetes.io/component\" || '') == 'restore-driver' || (element.endpointSelector.matchLabels.\"k8s:app.kubernetes.io/component\" || '') == 'restore-driver' }}"
                    operator: Equals
                    value: true
          - list: "request.object.specs || `[]`"
            deny:
              conditions:
                all:
                  - key: "{{ length(element.egress || `[]`) }}"
                    operator: GreaterThan
                    value: 0
                  - key: "{{ (element.endpointSelector.matchLabels.\"app.kubernetes.io/name\" || '') == 'vault-restore-validator' || (element.endpointSelector.matchLabels.\"k8s:app.kubernetes.io/name\" || '') == 'vault-restore-validator' || (element.endpointSelector.matchLabels.\"app.kubernetes.io/component\" || '') == 'restore-driver' || (element.endpointSelector.matchLabels.\"k8s:app.kubernetes.io/component\" || '') == 'restore-driver' }}"
                    operator: Equals
                    value: true
