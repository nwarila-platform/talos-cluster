        images.containers.map(image, verifyImageSignatures(image, [attestors.nwarila])).all(e, e > 0) &&
        images.initContainers.map(image, verifyImageSignatures(image, [attestors.nwarila])).all(e, e > 0) &&
        images.ephemeralContainers.map(image, verifyImageSignatures(image, [attestors.nwarila])).all(e, e > 0)
      message: "first-party nwarila image failed keyless signature verification (ImageValidatingPolicy)"
