# ImageValidatingPolicy: verify-first-party-nwarila
#
# NON-BLOCKING (Audit) canary — the migration off the legacy verifyImages
# ClusterPolicy `verify-image-signatures-enforced`, which cannot verify first-party
# images on the ADMISSION path (a Kyverno dispatch bug: legacy verifyImages +
# webhookConfiguration.matchConditions miscategorizes the policy so the mutating
# image-verification never runs, leaving pods unannotated -> the 2026-07-14 brick
# class at Enforce). ImageValidatingPolicy verifies INLINE in the validating webhook
# (no mutation->annotation handoff), so it works at admission. Offline keyless pins
# (Fulcio roots + Rekor pubkey + CT pubkey) with ctlog.url present as a runtime dead
# fallback (cosign's opts builder requires a non-empty url even when rekorPubKey is
# pinned) -> no online Rekor/Fulcio/CT/TUF call on the admission path.
# validationActions [Deny] + failurePolicy Fail: first-party signatures ENFORCE
# fail-closed -- unsigned/mis-signed first-party pods are DENIED at admission.
# Pins mirror scripts/check-image-signature-enforcement.py. See cp1_offline_verify_decision.
apiVersion: policies.kyverno.io/v1beta1
kind: ImageValidatingPolicy
metadata:
  name: verify-first-party-nwarila
  annotations:
    policies.kyverno.io/title: Verify First-Party Image Signatures (nwarila)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: first-party-image-present
      expression: >-
        object != null && (
          (has(object.spec.containers) && object.spec.containers.exists(c, c.image.startsWith('ghcr.io/nwarila/'))) ||
          (has(object.spec.initContainers) && object.spec.initContainers.exists(c, c.image.startsWith('ghcr.io/nwarila/'))) ||
          (has(object.spec.ephemeralContainers) && object.spec.ephemeralContainers.exists(c, c.image.startsWith('ghcr.io/nwarila/')))
        )
  matchImageReferences:
    - glob: "ghcr.io/nwarila/*"
  attestors:
    - name: nwarila
      cosign:
        keyless:
