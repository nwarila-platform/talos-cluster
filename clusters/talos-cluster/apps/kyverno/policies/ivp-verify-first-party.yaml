# ImageValidatingPolicy: verify-first-party
#
# First-party image-signature verification. This MUST remain the ONLY
# ImageValidatingPolicy in this rendered policy set. A second IVP matching the
# same admission request silently resurrects both Kyverno v1.18.2 defects below.
#
# Defect A: IVP annotation clobber. handleMutation builds a fresh results map
# without reading the existing `kyverno.io/image-verification-outcomes`
# annotation (pkg/cel/policies/ivpol/engine/engine.go:218), and
# MakeImageVerifyOutcomePatch writes that annotation with JSON-Patch add,
# replacing the whole key (pkg/image/verification/evaluator/validate.go:63-92;
# key constant api/kyverno/constants.go:16). Each fine-grained webhook evaluates
# only its own policy (pkg/webhooks/resource/ivpol/handler.go:56-66), so multiple
# matching IVPs clobber each other's outcome entry and the losing validators deny
# with "policy not evaluated" at pkg/cel/policies/ivpol/engine/engine.go:356.
#
# Defect B: IVP autogen slot collision. The engine reconciler stores generated
# controller variants under global NamespacedName slots named "defaults" and
# "cronjobs" (pkg/cel/policies/ivpol/engine/reconciler.go:90-101), so multiple
# IVPs contend for one live controller-level policy per autogen slot. Status
# churn therefore is indirectly on the admission data path: it rotates which IVP
# owns those slots and which controller admissions are actually enforced.
#
# The merge is structural mitigation: one policy name means one annotation entry,
# and one IVP owns the autogen slots. spec.autogen is set explicitly to preserve
# Kyverno's full default controller coverage: daemonsets, deployments,
# replicasets, statefulsets, jobs, and cronjobs. Narrowing this list would be an
# enforcement posture change.
#
# The matchConditions expression is load-bearing. Kyverno's fine-grained webhook
# selection keys off validConditions / MatchPolicy:Exact / custom timeout, not
# matchImageReferences. Removing matchConditions would aggregate this policy into
# the shared cluster-wide webhook for its current Fail posture. That is the
# cluster-wide brick surface (`validate.kyverno.svc-fail`), which already has
# rules=8 in the live cluster.
#
# Credential coupling is intentional for this CP-1 merge: ghcr-pull now applies
# to all first-party fetches. An expired credential affects all three orgs rather
# than only the hwg org: at the current Fail posture it denies all three. CP-3
# narrows this with per-repository scoped credentials.
#
# The validation CEL is copied from the Kyverno compiler-clean scratch artifact.
# Its ternary else branch is a maintenance hazard: a future fourth org added to
# matchImageReferences must add a dedicated ternary arm before the glob lands, or
# it could verify against the wrong attestor. The guard pins this shape.
#
# Offline keyless pins (Fulcio roots + Rekor pubkey + CT pubkey) with ctlog.url
# present as a runtime dead fallback (cosign's opts builder requires a non-empty
# url even when rekorPubKey is pinned) -> no online Rekor/Fulcio/CT/TUF call on
# the admission path.
# POSTURE THIS STEP: validationActions [Deny] + failurePolicy Fail -- fail-closed
# enforcement. Unsigned, mis-signed, or unverifiable first-party pods are DENIED
# at admission. The Audit canary step is complete: the live run showed all-pass
# PolicyReports with zero rule errors against real first-party images, which is
# the real acceptance test because Kyverno's policy-validation webhook only WARNS
# on CEL compile errors. The CI guard constants IVP_VALIDATION_ACTION /
# IVP_REQUIRED_FAILURE_POLICY move in lockstep with this posture.
# Pins mirror scripts/check-image-signature-enforcement.py. See cp1_offline_verify_decision.
apiVersion: policies.kyverno.io/v1beta1
kind: ImageValidatingPolicy
metadata:
  name: verify-first-party
  annotations:
    policies.kyverno.io/title: Verify First-Party Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
spec:
  validationActions: [Deny]
  failurePolicy: Fail
  evaluation:
    admission:
      enabled: true
    background:
      enabled: true
  autogen:
    podControllers:
      controllers:
        - daemonsets
        - deployments
        - replicasets
        - statefulsets
        - jobs
        - cronjobs
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: first-party-image-present
      expression: >-
        object != null && (
          (has(object.spec.containers) && object.spec.containers.exists(c, c.image.startsWith('ghcr.io/the-hero-wars-guys/') || c.image.startsWith('ghcr.io/nwarila-platform/') || c.image.startsWith('ghcr.io/nwarila/'))) ||
          (has(object.spec.initContainers) && object.spec.initContainers.exists(c, c.image.startsWith('ghcr.io/the-hero-wars-guys/') || c.image.startsWith('ghcr.io/nwarila-platform/') || c.image.startsWith('ghcr.io/nwarila/'))) ||
          (has(object.spec.ephemeralContainers) && object.spec.ephemeralContainers.exists(c, c.image.startsWith('ghcr.io/the-hero-wars-guys/') || c.image.startsWith('ghcr.io/nwarila-platform/') || c.image.startsWith('ghcr.io/nwarila/')))
        )
  matchImageReferences:
    - glob: "ghcr.io/the-hero-wars-guys/*"
    - glob: "ghcr.io/nwarila/*"
    - glob: "ghcr.io/nwarila-platform/*"
