apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-config-operator-vault
  namespace: vault-config-operator
  labels:
    nwarila.io/platform-addon: vault-config-operator
  annotations:
    # This SA is ONLY an identity for the operator's per-reconcile Vault
    # k8s-auth login (the operator mints a short-lived projected TokenRequest for
    # it via its serviceaccounts/token RBAC). It is bound in the out-of-band Vault
    # role auth/kubernetes/role/vault-config-operator (see
    # apps/vault/vault-config/bootstrap/, ADR-0028). It never runs a pod, so it
    # does not auto-mount a token.
    nwarila.io/purpose: vault-config-operator per-reconcile k8s-auth identity
automountServiceAccountToken: false
