apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vault-config-operator-egress
  namespace: vault-config-operator
spec:
  # Namespace-scoped: the manager needs DNS + apiserver for CRD watches and
  # leader election. Vault egress (:8200) is intentionally NOT granted here --
  # the operator is inert until it has a bootstrap Vault role (S2b) and its
  # first CR (S3); Vault egress is added in the slice that gives it live work,
  # keeping the blast radius minimal until then.
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - kube-apiserver
