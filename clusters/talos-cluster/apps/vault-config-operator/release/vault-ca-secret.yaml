# PUBLIC trust material only (the TCN root CA certificate) — not a secret in
# the confidentiality sense, delivered as a Secret for mount ergonomics. This
# mirrors the vso-vault-ca pattern in vault-secrets-operator: every Vault API
# client carries the root CA so the serving certificate (issued by
# pki-int-tcn) verifies without touching system trust stores.
#
# Consumed by the manager Deployment via the HelmRelease values (volumes +
# volumeMounts + VAULT_CACERT). CRs that omit spec.connection fall back to the
# manager environment (vault/api DefaultConfig reads VAULT_ADDR/VAULT_CACERT),
# so this Secret is part of the operator's GLOBAL Vault connection (CP-4 S4
# decision: global connection, not per-CR).
apiVersion: v1
kind: Secret
metadata:
  name: vault-config-operator-vault-ca
  namespace: vault-config-operator
  labels:
    app.kubernetes.io/name: vault-config-operator
    app.kubernetes.io/component: vault-ca-trust
type: Opaque
