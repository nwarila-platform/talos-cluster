# Kustomize index aggregating every app under this cluster.
# deploy-* entries are generated by scripts/sync-deploy-repos.sh.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deploy-vault
  - gateway-api
  - kubelet-csr-approver
  - kyverno
  - metrics-server
  - namespace-hardening
  - vault-aws-access
