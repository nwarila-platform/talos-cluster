# Kustomize index aggregating every app under this cluster.
# deploy-* entries are generated by scripts/sync-deploy-repos.sh.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - actions-runner-controller
  - cert-manager
  - cilium
  - dr-backup
  - dr-etcd-backup
  - gateway-api
  - kubelet-csr-approver
  - kyverno
  - longhorn
  - longhorn-etcd-storage
  - longhorn-vault-storage
  - metrics-server
  - namespace-hardening
  - network-floor
  - kustomization-source-rotator.yaml
  - talos-drift
  - vault-auth
  - vault-aws-access
  - vault-config-operator
  - kustomization-vault-config-managed.yaml
  - vault-kustomization.yaml
  - vault-restore-validator
  - vault-secrets-operator
  - vault-tls
  - kustomization-vault-tls-cm.yaml
