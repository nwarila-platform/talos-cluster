# This HelmRelease adopts the out-of-band bootstrap Cilium release.
# Values mirror addons/cilium/values.yaml and the saved live values.
# The first reconcile is a proven no-op: server-side dry-run 40/40 identical.
# upgrade.crds: Skip and driftDetection: disabled protect the live CNI.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m
  releaseName: cilium
  chart:
    spec:
      chart: cilium
      version: "1.19.4"
      sourceRef:
        kind: HelmRepository
        name: cilium
      interval: 1h
  install:
    crds: Create
  upgrade:
    crds: Skip
    remediation:
      remediateLastFailure: false
    cleanupOnFail: true
  test:
    enable: false
  driftDetection:
    mode: disabled
  values:
    MTU: 1380
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    encryption:
      enabled: true
      nodeEncryption: false
      type: wireguard
    gatewayAPI:
      enabled: true
      gatewayClass:
        create: "false"
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
    ipam:
      mode: kubernetes
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    kubeProxyReplacement: true
    securityContext:
      capabilities:
        ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
        cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE
