# Child Flux Kustomization for the kube-system-scoped Cilium release resources.
#
# kube-system already exists before Flux starts because it is a Kubernetes
# system namespace. This child applies the HelmRepository and HelmRelease there
# without a namespace-create dependency.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/talos-cluster/apps/cilium/release
  prune: true
  wait: true
  timeout: 15m
  force: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cilium
      namespace: kube-system
