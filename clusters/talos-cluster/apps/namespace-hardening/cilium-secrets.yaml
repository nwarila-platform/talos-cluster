# Namespace `cilium-secrets` - restricted PSS enforce.
#
# Cilium creates this namespace for Gateway-API TLS Secret material. It holds
# no pods, so applying restricted is pure hygiene for an otherwise unlabelled
# namespace and cannot break a workload.
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-secrets
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
