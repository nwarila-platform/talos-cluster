# Namespace `flux-system` — restricted PSS enforce.
#
# All 4 Flux controllers (helm-controller, kustomize-controller,
# notification-controller, source-controller) ship with full restricted-
# compliant securityContext per Flux v2.8.8:
#   allowPrivilegeEscalation: false
#   runAsNonRoot: true
#   capabilities.drop: [ALL]
#   seccompProfile.type: RuntimeDefault
#   readOnlyRootFilesystem: true
#   no hostNetwork/hostPID/hostIPC
#
# Verified live on 2026-05-26 before applying this label. Future Flux
# upgrades that regress these settings will fail admission, which is
# the desired safety property.
apiVersion: v1
kind: Namespace
metadata:
  name: flux-system
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
