apiVersion: batch/v1
kind: CronJob
metadata:
  name: source-rotator-hwg
  namespace: source-rotator
  labels:
    app.kubernetes.io/name: source-rotator
    app.kubernetes.io/component: source-token-minter
spec:
  schedule: "*/45 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: source-rotator
            app.kubernetes.io/component: source-token-minter
        spec:
          serviceAccountName: source-rotator-hwg
          automountServiceAccountToken: true
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: minter
              image: python@sha256:8373231e1e906ddfb457748bfc032c4c06ada8c759b7b62d9c73ec2a3c56e710
              imagePullPolicy: IfNotPresent
              command:
                - python3
                - /script/minter.py
              env:
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"
                - name: ORG_PREFIX
                  value: hwg
                - name: VAULT_ADDR
                  value: https://vault.deploy-vault.svc:8200
                - name: VAULT_ROLE
                  value: source-minter-hwg
                - name: VAULT_KEY_PATH
                  value: secret/data/platform/org-pull/hwg/gitops-source-auth
                - name: VAULT_CACERT
                  value: /etc/vault-ca/ca.crt
              volumeMounts:
                - name: script
                  mountPath: /script
                  readOnly: true
                - name: vault-ca
                  mountPath: /etc/vault-ca
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
          volumes:
            - name: script
              configMap:
                name: source-rotator-hwg-script
                defaultMode: 0555
            - name: vault-ca
              configMap:
                name: vault-ca
                defaultMode: 0444
                items:
                  - key: ca.crt
                    path: ca.crt
            - name: tmp
              emptyDir: {}