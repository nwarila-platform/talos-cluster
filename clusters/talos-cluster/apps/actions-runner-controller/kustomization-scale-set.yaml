apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: actions-runner-controller-scale-set
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/talos-cluster/apps/actions-runner-controller/scale-set
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: actions-runner-controller
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: talos-arc-ci
      namespace: arc-runners
