# CP-5 — the cert-manager Vault ClusterIssuer that auto-renews certificates
# from the pki-int-tcn intermediate CA (first consumer: Vault's own serving
# cert, replacing the static SOPS-delivered one whose expiry is 2026-09-10).
#
# NAME IS LOAD-BEARING: cert-manager v1.21.0 mints the SA token with default
# audiences [vault://<cluster-issuer-name>, <spec.vault.server>]
# (internal/vault/vault.go:576-583) and the managed Vault k8s-auth role pins
# audience = "vault://vault-server" — renaming this issuer breaks the pairing.
#
# auth.kubernetes.mountPath is omitted: the default constant is
# /v1/auth/kubernetes (pkg/apis/certmanager/v1/const.go:42), which is exactly
# our mount. serviceAccountRef resolves in the cluster-resource-namespace,
# which the Helm chart defaults to the release namespace (cert-manager) —
# where serviceaccount.yaml creates the dedicated SA.
#
# caBundle = the Trinity Technical Services ROOT CA (public material; same
# trust anchor as apps/dr-backup/vault-ca-configmap.yaml and the VSO CA
# secret). It validates the serving chain (leaf <- TCN Internal Intermediate
# CA 2026 <- root) on the issuer's HTTPS calls to Vault.
#
# The sign path is the FULL Vault endpoint (mount/sign/role): issuance is a
# CSR sign — the private key never leaves the cluster, and the vault-server
# PKI role constrains every certificate parameter server-side.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-server
spec:
  vault:
    server: https://vault.deploy-vault.svc.cluster.local:8200
    path: pki-int-tcn/sign/vault-server
    caBundle: 
    auth:
      kubernetes:
        role: vault-server
        serviceAccountRef:
          name: cert-manager-vault-issuer
