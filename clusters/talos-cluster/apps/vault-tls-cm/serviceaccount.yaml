# CP-5 — the DEDICATED, pod-less ServiceAccount the cert-manager Vault
# ClusterIssuer authenticates as (serviceAccountRef). No pod ever runs as this
# SA and nothing mounts its token: cert-manager mints short-lived (600s)
# TokenRequests on demand, authorized by the resourceNames-scoped Role in
# rbac-token-request.yaml. Lives in cert-manager (the chart's
# cluster-resource-namespace default = the release namespace), which is where
# cert-manager resolves a ClusterIssuer's serviceAccountRef.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-manager-vault-issuer
  namespace: cert-manager
automountServiceAccountToken: false
