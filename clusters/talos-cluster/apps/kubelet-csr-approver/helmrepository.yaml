# HelmRepository — postfinance chart index for kubelet-csr-approver.
# Polled every 1h by source-controller; the chart is cached locally as an
# OCI artifact and re-rendered by helm-controller on every HelmRelease reconcile.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: postfinance
  # Live with the HelmRelease in kube-system rather than flux-system so the
  # cross-namespace ref goes away. This is the canonical Flux multi-tenancy
  # pattern — sources colocate with the consumers that reference them.
  # Required for --no-cross-namespace-refs=true to be safe to enable.
  namespace: kube-system
spec:
  interval: 1h
  url: https://postfinance.github.io/kubelet-csr-approver
