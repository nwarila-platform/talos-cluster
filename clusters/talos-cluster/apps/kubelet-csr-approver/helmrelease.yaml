# HelmRelease — manages the kubelet-csr-approver Helm release declaratively.
#
# Takes over the existing release that was installed by `helm install` in
# commit 6c9a594 (ADR-0005). Because spec.chart.version, spec.targetNamespace,
# and spec.values are byte-equivalent to what the live release was installed
# with, helm-controller's first reconciliation is a no-op against the cluster
# (Helm 3 sees identical desired state and skips the upgrade).
#
# See:
#   addons/kubelet-csr-approver/values.yaml — values source
#   docs/decision-records/repo/0005-kubelet-csr-approver.md — original ADR
#   docs/decision-records/repo/0008-gitops-via-flux.md — Flux adoption ADR
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubelet-csr-approver
  namespace: kube-system
spec:
  interval: 10m
  releaseName: kubelet-csr-approver
  chart:
    spec:
      chart: kubelet-csr-approver
      version: 1.2.14
      sourceRef:
        kind: HelmRepository
        name: postfinance
        namespace: flux-system
      interval: 1h
  # Inline values mirror addons/kubelet-csr-approver/values.yaml. Keeping
  # them inline (vs valuesFrom: ConfigMap) trades one file for explicitness
  # at the diff level — a single PR shows both the chart version bump
  # and the value changes that go with it.
  values:
    providerRegex: '^(cp[1-3]|w[1-3])$'
    providerIpPrefixes:
      - 10.69.112.0/24
    bypassDnsResolution: true
    bypassHostnameCheck: false
    ignoreNonSystemNode: true
    replicas: 2
    metrics:
      enable: false
  # Conservative upgrade policy: never roll back on failure (the operator
  # decides whether to roll back manually). Don't recreate pods on upgrade
  # unless absolutely necessary; let the controller's standard reconciler
  # decide.
  upgrade:
    remediation:
      remediateLastFailure: false
    cleanupOnFail: true
  # Test gate disabled — the chart doesn't ship `helm test`-style probes.
  test:
    enable: false
