apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dr-soak-observer
  labels:
    app.kubernetes.io/name: dr-soak-observer
    app.kubernetes.io/component: soak-observation
rules:
  - apiGroups:
      - kyverno.io
    resources:
      - clusterpolicies
      - policies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - wgpolicyk8s.io
    resources:
      - clusterpolicyreports
      - policyreports
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - kustomize.toolkit.fluxcd.io
    resources:
      - kustomizations
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - source.toolkit.fluxcd.io
    resources:
      - gitrepositories
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - validatingwebhookconfigurations
    verbs:
      - get
      - list
      - watch
