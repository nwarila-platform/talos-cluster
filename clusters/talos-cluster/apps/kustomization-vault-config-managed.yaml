# Child Flux Kustomization for the CP-4 managed Vault-config CRs.
#
# prune: true — ARMED in S7 (adopt-before-prune completed: S4a/S5b adoption
# proven by read-back parity; the S6b reference-safety guard is CI-live). A
# git removal now deletes the CR, and the operator finalizer deletes the LIVE
# Vault object. The controls that make this safe (full runbook in
# vault-config/README.md "Prune (ARMED in S7)"):
#   1. S6b guard: a PR removing a provider still referenced in git FAILS CI
#      (scripts/check-vault-config-reference-safety.py) — the
#      delete-under-a-consumer class cannot reach main.
#   2. dependsOn vault: while Vault is NotReady this Kustomization does not
#      reconcile AT ALL — including prune — so deletions merged during an
#      outage apply only once Vault is healthy (don't-prune-when-unreachable).
#   3. Upstream #133 (a Vault-side delete error strands the finalizer, CR
#      hangs Terminating): SILENT at the Flux layer — prune of a
#      finalizer-bearing object reports SUCCESS (source-verified at
#      kustomize-controller v1.9.1: the apiserver accepts the DELETE, the
#      object leaves status.Inventory, wait health-checks only the apply
#      set; upstream test "accepted delete leaves inventory" pins it).
#      DETECTION is therefore external: the daily scan workflow runs
#      scripts/check-vault-config-terminating.py against the live CRs and
#      goes RED on any deletion stuck >30m (the zero-red sweep surface).
#      Blast radius is bounded by control 1: only UNREFERENCED objects can
#      be pruned, so a stranded delete leaves an inert orphan, never a
#      consumer break. Unstick runbook in the README (remove the finalizer
#      ONLY after deciding the live object's intended fate).
#
# ROLLBACK of an individual mistaken deletion: revert the removing PR before
# reconcile; if the CR is already Terminating, follow the README runbook.
# Always name the full resource — `kubectl get policy` is AMBIGUOUS (kyverno
# also defines `policies`).
#
# dependsOn: the operator must be Ready (webhook + controller) and Vault must
# be reconciled before adoption CRs apply. healthCheckExprs turn a failed
# adoption (ReconcileSuccessful=False, e.g. Vault unreachable or the bootstrap
# role rejects the login) into a NotReady Kustomization — fail-closed and
# visible in flux get kustomizations, no silent half-adopt.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vault-config-managed
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/talos-cluster/apps/vault/vault-config/managed
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: vault-config-operator
    - name: vault
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthCheckExprs:
    # Semantics chosen against the operator's ACTUAL condition behavior
    # (source-verified, vaultresourcecontroller/utils.go ManageOutcome):
    # success sets ReconcileSuccessful=True; failure sets a DIFFERENT type
    # (ReconcileFailed) that LINGERS after a later success (same-type-replace
    # only). So: no `failed` expression (a lingering ReconcileFailed would
    # permanently fail a now-healthy CR) — an unhealthy CR simply never turns
    # `current` and the Kustomization goes NotReady at timeout (fail-closed).
    # exists() not filter().all() (all() over an empty list is vacuously true),
    # and observedGeneration == metadata.generation so a STALE success from a
    # previous spec generation cannot report a failing edit as healthy.
    - apiVersion: redhatcop.redhat.io/v1alpha1
      kind: Policy
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'ReconcileSuccessful' && c.status == 'True' && c.observedGeneration == metadata.generation)
    - apiVersion: redhatcop.redhat.io/v1alpha1
      kind: KubernetesAuthEngineRole
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'ReconcileSuccessful' && c.status == 'True' && c.observedGeneration == metadata.generation)
    # CP-4 S5b: the two PKI adoption kinds share the operator's condition
    # machinery (vaultresourcecontroller ManageOutcome), so the same
    # fail-closed expression applies. Without an expr a new kind would fall
    # back to kstatus and read Current immediately — a failed adoption would
    # look healthy.
    - apiVersion: redhatcop.redhat.io/v1alpha1
      kind: SecretEngineMount
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'ReconcileSuccessful' && c.status == 'True' && c.observedGeneration == metadata.generation)
    - apiVersion: redhatcop.redhat.io/v1alpha1
      kind: PKISecretEngineRole
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'ReconcileSuccessful' && c.status == 'True' && c.observedGeneration == metadata.generation)
