# Hand-authored — NOT generated by scripts/sync-deploy-repos.sh.
#
# Holds the IAM Roles Anywhere *workload* certificate that Vault's KMS
# auto-unseal seal principal uses to mint short-lived STS credentials. It is
# delivered as a SOPS-encrypted Secret into the deploy-vault namespace.
#
# Why it lives here (and not in the deploy-vault repo overlay):
#   - Only the flux-system Kustomization carries the sops-age decryption
#     provider, so SOPS-encrypted material must be reconciled from this tree.
#   - The per-app deploy-vault Flux Kustomization runs as the namespace-scoped
#     deploy-reconciler ServiceAccount and has no decryption configured.
#   - This directory name does not start with "_", so scripts/sync-deploy-repos.sh
#     re-indexes it on the next sync and never overwrites it (unlike the
#     generated tenants/deploy-vault namespace envelope or the apps/vault
#     workload tree).
#
# See deploy-vault ADR-0008 (auto-unseal) and ADR-0009 (escrow + ceremony).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - vault-ra-cert.sops.yaml
