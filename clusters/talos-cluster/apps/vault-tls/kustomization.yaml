# Hand-authored — NOT generated by scripts/sync-deploy-repos.sh.
#
# Holds Vault's durable bootstrap-breaking listener certificate Secret. The
# deploy-vault workload mounts and consumes this Secret in its own TLS flip, but
# the protected talos-cluster side owns delivery because only flux-system has
# the SOPS age decryption key.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - vault-serving-cert.sops.yaml
