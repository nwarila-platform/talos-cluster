# Child Flux Kustomization for the throwaway SOPS Secret clone validation
# ClusterPolicy. The Secret and test namespaces are applied by the root
# flux-system Kustomization, which is also the SOPS-decrypting owner.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-clone-validation-policy
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/talos-cluster/apps/kyverno-clone-validation/policy
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: kyverno
  sourceRef:
    kind: GitRepository
    name: flux-system
