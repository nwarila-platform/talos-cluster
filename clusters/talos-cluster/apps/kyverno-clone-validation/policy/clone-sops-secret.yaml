# ClusterPolicy: clone-sops-secret-validation
#
# Throwaway proof that Kyverno generate can clone a Flux/SOPS-decrypted
# Secret into a namespace selected by a distinct validation label.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: clone-sops-secret-validation
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Clone SOPS-Decrypted Secret Validation
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Namespace, Secret
    policies.kyverno.io/minversion: 1.18.0
    kyverno.io/kyverno-version: "1.18.1"
    policies.kyverno.io/description: >-
      Clones a dummy SOPS-decrypted Secret into namespaces carrying the
      validation.nwarila.io/sops-clone-test=true label. This is a throwaway
      validation policy for the future org-secret pipeline and must not match
      ordinary tenant namespaces.
spec:
  background: true
  rules:
    - name: clone-dummy-sops-secret
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  validation.nwarila.io/sops-clone-test: "true"
      generate:
        generateExisting: true
        apiVersion: v1
        kind: Secret
        name: sops-clone-validation-source
        namespace: '{{request.object.metadata.name}}'
        synchronize: true
        clone:
          namespace: kyverno-clone-validation-source
          name: sops-clone-validation-source
