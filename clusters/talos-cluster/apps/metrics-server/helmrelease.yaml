# HelmRelease — metrics-server with cluster-CA-validated kubelet TLS.
#
# Initial install was Sub-cycle A (commit 00ba686) which deployed with
# --kubelet-insecure-tls. This Sub-cycle B drops the flag because:
#
#   - kubelet now creates serving CSRs (ADR-0005's
#     rotate-server-certificates) signed by the cluster CA
#   - postfinance/kubelet-csr-approver auto-approves them
#   - every node's kubelet serving cert validates against the cluster CA
#   - metrics-server's default behavior (which validates) works
#
# If reverting: re-add `--kubelet-insecure-tls` to the args list. The
# release will remain healthy because kubelet's self-signed fallback
# is still trusted by --kubelet-insecure-tls semantics.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 10m
  releaseName: metrics-server
  chart:
    spec:
      chart: metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        # namespace omitted: defaults to this HelmRelease's namespace
        # (kube-system). Required for --no-cross-namespace-refs=true.
      interval: 1h
  # values: intentionally omitted. metrics-server uses its chart defaults,
  # which validate the kubelet serving cert against the cluster CA.
  upgrade:
    remediation:
      remediateLastFailure: false
    cleanupOnFail: true
  test:
    enable: false
