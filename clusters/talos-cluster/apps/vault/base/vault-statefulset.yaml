apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: server
spec:
  serviceName: vault-internal
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: vault
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: vault
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vault
                  app.kubernetes.io/component: server
              topologyKey: kubernetes.io/hostname
      initContainers:
        # Native sidecar (restartPolicy: Always) — starts before Vault and runs
        # for the pod's lifetime. Continuously refreshes short-lived AWS
        # credentials (IAM Roles Anywhere -> STS) into a shared, memory-backed
        # credentials FILE that Vault's awskms seal reads via
        # AWS_SHARED_CREDENTIALS_FILE.
        #
        # The earlier IMDSv2 `serve` shim was abandoned: Vault 2.0.1's awskms
        # seal (AWS SDK Go v1) does NOT honor AWS_EC2_METADATA_SERVICE_ENDPOINT,
        # so it never queried the loopback shim (proven empirically: the helper
        # logged zero incoming requests while vending valid creds; Vault failed
        # with NoCredentialProviders). The shared-credentials-file path is the
        # canonical Vault + Roles Anywhere integration and is honored by the
        # SDK's default chain (env -> shared file -> instance metadata).
        # ADR-0008 / ADR-0011; talos-cluster ADR-0012. Image: from-source
        # GOFIPS140 helper, digest-pinned + cosign-verified.
        - name: aws-signing-helper
          image: ghcr.io/nwarila-platform/ubi9-aws-signing-helper
          restartPolicy: Always
          args:
            - update
            - --region=us-east-1
            - --certificate=/aws/certs/tls.crt
            - --private-key=/aws/certs/tls.key
            - --trust-anchor-arn=arn:aws:rolesanywhere:us-east-1:793496711039:trust-anchor/9ecc96c8-4f38-43e3-8ba9-0fe3535c8ede
            - --profile-arn=arn:aws:rolesanywhere:us-east-1:793496711039:profile/ef2549c7-c86b-4dd2-afa6-ccc186c49f06
            - --role-arn=arn:aws:iam::793496711039:role/vault-unseal-runtime
            - --profile=default
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /aws/creds/credentials
          # No probe needed: `update` runs as a refresh loop with no network
          # listener. The bootstrap init container below guarantees the
          # credentials file exists and is valid before Vault starts.
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: aws-ra-cert
              mountPath: /aws/certs
              readOnly: true
            - name: aws-creds
              mountPath: /aws/creds
        # Regular init container (runs to completion BEFORE Vault) — writes the
        # credentials file once so Vault never races an empty file at first
        # start. The native sidecar above keeps it refreshed for the pod's life
        # (covering in-pod Vault container restarts past the ~1h credential TTL).
        - name: aws-creds-bootstrap
          image: ghcr.io/nwarila-platform/ubi9-aws-signing-helper
          args:
            - update
            - --once
            - --region=us-east-1
            - --certificate=/aws/certs/tls.crt
            - --private-key=/aws/certs/tls.key
            - --trust-anchor-arn=arn:aws:rolesanywhere:us-east-1:793496711039:trust-anchor/9ecc96c8-4f38-43e3-8ba9-0fe3535c8ede
            - --profile-arn=arn:aws:rolesanywhere:us-east-1:793496711039:profile/ef2549c7-c86b-4dd2-afa6-ccc186c49f06
            - --role-arn=arn:aws:iam::793496711039:role/vault-unseal-runtime
            - --profile=default
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /aws/creds/credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: aws-ra-cert
              mountPath: /aws/certs
              readOnly: true
            - name: aws-creds
              mountPath: /aws/creds
      containers:
        - name: vault
          image: ghcr.io/nwarila-platform/ubi9-hashicorp-vault
          args:
            - server
            - -config=/vault/config/vault.hcl
          ports:
            - name: api
              containerPort: 8200
            - name: cluster
              containerPort: 8201
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VAULT_RAFT_NODE_ID
              value: "$(HOSTNAME)"
            # Advertise stable StatefulSet DNS, not pod IPs. The 2026-06-10
            # quorum-loss incident was caused by stale pod-IP Raft membership
            # after worker/pod churn.
            - name: VAULT_API_ADDR
              value: "https://$(HOSTNAME).vault-internal.deploy-vault.svc.cluster.local:8200"
            - name: VAULT_CLUSTER_ADDR
              value: "https://$(HOSTNAME).vault-internal.deploy-vault.svc.cluster.local:8201"
            - name: VAULT_ADDR
              value: "https://$(HOSTNAME).vault-internal.deploy-vault.svc.cluster.local:8200"
            - name: VAULT_CACERT
              value: /vault/tls/ca.crt
            # AWS KMS auto-unseal (ADR-0008). Credentials come from the
            # aws-signing-helper sidecar's shared credentials file (IAM Roles
            # Anywhere -> STS), refreshed before expiry; region from env. The
            # awskms seal's AWS SDK reads this file via its default chain.
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /aws/creds/credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /vault/data
            - name: config
              mountPath: /vault/config
              readOnly: true
            - name: vault-serving-cert
              mountPath: /vault/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: aws-creds
              mountPath: /aws/creds
              readOnly: true
          startupProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200
              port: 8200
              scheme: HTTPS
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
              scheme: HTTPS
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200&perfstandbyok=true
              port: 8200
              scheme: HTTPS
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: vault-config
            items:
              - key: vault.hcl
                path: vault.hcl
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        # Roles Anywhere workload cert (SOPS Secret created by talos-cluster in
        # apps/vault-aws-access/). Mounted ONLY into the signing-helper
        # containers (sidecar + bootstrap), never into Vault itself.
        - name: aws-ra-cert
          secret:
            secretName: vault-ra-cert
            defaultMode: 0400
        # CP-5d cutover: the serving LEAF+KEY now come from the cert-manager
        # managed Secret (auto-renewed ~every 60d by the vault-server
        # ClusterIssuer; CP-5c), while the TRUST ANCHOR (tls_client_ca_file +
        # raft leader_ca_cert_file read /vault/tls/ca.crt) comes from the
        # vault-tls-trust ConfigMap — byte-identical to the pre-cutover
        # root+intermediate bundle, so the roll changes ONLY the leaf/key and
        # never silently moves a trust decision (the issued Secret's ca.crt
        # carries just the intermediate, which would have narrowed it).
        # ROLLBACK: revert this volume to `secret: vault-serving-cert` (the
        # SOPS-delivered static secret, kept live until the first auto-renewal
        # is proven; its cert is valid to 2026-09-10).
        - name: vault-serving-cert
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: vault-serving-cert-cm
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
              - configMap:
                  name: vault-tls-trust
                  items:
                    - key: ca.crt
                      path: ca.crt
        # Shared, memory-backed (tmpfs) volume carrying the short-lived AWS
        # credentials file the helper writes and Vault's awskms seal reads.
        # Never touches disk; sized for a single credentials file.
        - name: aws-creds
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-vault
        resources:
          requests:
            storage: 10Gi
