# CP-4 S5b — ADOPTED live PKI issuance role (redhat-cop vault-config-operator).
# Field-for-field translation of the live pki-int-tcn/roles/tcn-client
# captured 2026-07-16: the general internal mTLS CLIENT role of the tcn
# private CA (client_flag only, no server usage; 24h TTL, CN/SANs from CSR).
# Same adoption/parity/rollback discipline as pkirole-vault-server.yaml.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: PKISecretEngineRole
metadata:
  name: tcn-client
  namespace: vault-config-operator
spec:
  path: pki-int-tcn
  authentication:
    path: kubernetes
    role: vault-config-operator
    serviceAccount:
      name: vault-config-operator-vault
  TTL: "24h"
  maxTTL: "720h"
  notBeforeDuration: "30s"
  allowLocalhost: false
  allowedDomains: []
  allowedDomainsTemplate: false
  allowBareDomains: false
  allowSubdomains: false
  allowGlobDomains: false
  allowAnyName: false
  enforceHostnames: true
  allowIPSans: false
  allowedURISans: []
  allowedOtherSans: ""
  serverFlag: false
  clientFlag: true
  codeSigningFlag: false
  emailProtectionFlag: false
  keyType: "ec"
  keyBits: 256
  keyUsage:
    - DigitalSignature
    - KeyAgreement
    - KeyEncipherment
  extKeyUsage: []
  extKeyUsageOids: []
  useCSRCommonName: true
  useCSRSans: true
  ou: ""
  organization: ""
  country: ""
  locality: ""
  province: ""
  streetAddress: ""
  postalCode: ""
  serialNumber: ""
  generateLease: false
  noStore: false
  requireCn: true
  policyIdentifiers: []
  basicConstraintsValidForNonCa: false
