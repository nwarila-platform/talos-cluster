# CP-4 S5b — ADOPTED live PKI intermediate mount (redhat-cop vault-config-operator).
# The mount ALREADY EXISTS live (it issued the current Vault serving cert), so
# the operator's reconcile takes the Exists()->tune path ONLY: it can never
# re-create, never unmount (the bootstrap policy grants NO delete on
# sys/mounts/pki-int-tcn — CI-pinned by the bootstrap-invariants guard), and
# never touches CA material (no PKISecretEngineConfig CR is authored, ever:
# the intermediate cert/key is cryptographic STATE, not declarative config).
#
# config values are EXPLICIT PINS of live behavior (verify-adoption-parity.py
# enforces explicitness — the tune payload always sends them, so an omitted
# value would silently re-tune the mount to the system default):
# - maxLeaseTTL 315360000s (10y): live-explicit; bounds the intermediate's
#   issuance leases.
# - defaultLeaseTTL 2764800s (768h): live stores 0 (= system default, which
#   resolves to exactly 2764800s today); pinning it explicitly survives a
#   future change of the system default. Declared delta: sys/mounts config
#   shows 0 -> 2764800 after first reconcile, resolved behavior identical.
# - listing_visibility: the tune payload always writes the CRD default
#   "hidden"; live is unset, which Vault treats as hidden (declared cosmetic
#   delta, semantics identical).
# Connection: none (global VAULT_ADDR/VAULT_CACERT on the manager, PR #309).
apiVersion: redhatcop.redhat.io/v1alpha1
kind: SecretEngineMount
metadata:
  name: pki-int-tcn
  namespace: vault-config-operator
spec:
  authentication:
    path: kubernetes
    role: vault-config-operator
    serviceAccount:
      name: vault-config-operator-vault
  type: pki
  config:
    defaultLeaseTTL: "2764800"
    maxLeaseTTL: "315360000"
    forceNoCache: false
