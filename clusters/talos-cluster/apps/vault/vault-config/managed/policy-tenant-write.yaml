# CP-4 S4a — ADOPTED managed Vault ACL policy (redhat-cop vault-config-operator).
# spec.policy is the BYTE-EXACT live content captured at adoption (2026-07-15)
# (tenant-write only: the live bytes carried a stray CRLF tail from a
# hand-apply; this CR is the normalized content — a DECLARED whitespace-only
# first write, verified grant-identical),
# so the operator's first reconcile is a no-op adopt, never a semantic rewrite.
# Comment/wording improvements to the HCL are deliberate follow-up WRITES, made
# here (git is the source of truth now — the operator converges live to this).
# Connection: none (global VAULT_ADDR/VAULT_CACERT on the manager, PR #309).
# Content policing: scripts/check-vault-policy-no-escalation.py scans this CR's
# spec.policy (deny-by-default allowlist) — the S0 escalation guard.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: tenant-write
  namespace: vault-config-operator
spec:
  type: acl
  authentication:
    path: kubernetes
    role: vault-config-operator
    serviceAccount:
      name: vault-config-operator-vault
  policy: |
    path "secret/data/{{identity.entity.aliases.auth_kubernetes_fc0d86cb.metadata.service_account_namespace}}/state/*" {
      capabilities = ["read", "create", "update", "patch"]
    }
