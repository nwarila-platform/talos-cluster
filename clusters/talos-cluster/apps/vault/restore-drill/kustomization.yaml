apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# DRILL HARNESS — applied with `kubectl apply -k`, NEVER reconciled by Flux.
# This directory is intentionally absent from apps/vault/kustomization.yaml
# (which lists only `base`), so no Flux Kustomization builds or prunes it.
# Do NOT add this path to any parent kustomization.

namespace: vault-drill

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - services.yaml
  - networkpolicies.yaml
  - statefulset.yaml

configMapGenerator:
  - name: vault-drill-config
    files:
      - vault-drill.hcl

images:
  - name: ghcr.io/nwarila-platform/ubi9-hashicorp-vault
    digest: sha256:f4c4422b5a8ec5a56db67b937b429e655e5fd73e2c7c9a308e1636520fb5f244
  - name: ghcr.io/nwarila-platform/ubi9-aws-signing-helper
    digest: sha256:ed1d1940c015fce013ace82a0b7215c82b8b0217a7c9425b1ceca4946c9eb98f

# Keep the ConfigMap name stable (no content hash) so the runbook/guard can
# reference it deterministically.
generatorOptions:
  disableNameSuffixHash: true
