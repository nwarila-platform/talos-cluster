# Service account for the drill Vault pod. The drill Vault does NOT use the
# Kubernetes auth method and never talks to the API server (no apiserver egress
# is allowed — see networkpolicies.yaml), so its token is not auto-mounted.
# AWS credentials for the KMS unseal come exclusively from the IAM Roles
# Anywhere workload cert (vault-ra-cert), not from this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-drill
  labels:
    app.kubernetes.io/name: vault-drill
    app.kubernetes.io/component: server
automountServiceAccountToken: false
