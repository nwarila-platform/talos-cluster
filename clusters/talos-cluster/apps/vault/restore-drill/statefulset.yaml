apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault-drill
  labels:
    app.kubernetes.io/name: vault-drill
    app.kubernetes.io/component: server
spec:
  serviceName: vault-drill-internal
  # Single node — the drill is a standalone, isolated Raft of one. NEVER raise
  # this to 3: a multi-replica drill would only join ITSELF, but a single node
  # keeps the isolation argument trivially auditable.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vault-drill
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-drill
        app.kubernetes.io/component: server
        # NOTE: deliberately NO `vault-client: "true"` label. That label, in a
        # tenant-labelled namespace, would make the live
        # allow-tenant-vault-api-ingress policy admit this pod to the live
        # Vault API. The drill must never be a client of the live Vault.
    spec:
      serviceAccountName: vault-drill
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      # ndots:1 so fully-qualified AWS names (kms/sts/rolesanywhere.
      # us-east-1.amazonaws.com — 3 dots) are queried ABSOLUTE first rather than
      # via the cluster search domains. The Cilium L7 DNS proxy allow-lists the
      # three endpoints by EXACT matchName (not matchPattern — Cilium's `*` does
      # not span dots, so `*.amazonaws.com` would not match a 3-label regional
      # endpoint; see networkpolicies.yaml). With the default ndots:5 the resolver
      # tries search-domain expansions first; the proxy REFUSES those non-AWS
      # names and the Go resolver aborts on REFUSED ("server misbehaving")
      # before reaching the absolute name. ndots:1 sends the AWS lookups
      # straight through (they match a matchName entry) while the live Vault's
      # cluster-internal name stays REFUSED → DNS-BLOCKED, preserving isolation.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Native sidecar (restartPolicy: Always): refreshes short-lived AWS
        # credentials (IAM Roles Anywhere -> STS) into a memory-backed shared
        # file that Vault's awskms seal reads. Mirrors the live statefulset
        # exactly (same image digest, same role/trust-anchor/profile ARNs, same
        # AWS_SHARED_CREDENTIALS_FILE serve path) so the KMS unseal behaves
        # identically. The role (vault-unseal-runtime) is KMS-only.
        - name: aws-signing-helper
          image: ghcr.io/nwarila-platform/ubi9-aws-signing-helper
          restartPolicy: Always
          args:
            - update
            - --region=us-east-1
            - --certificate=/aws/certs/tls.crt
            - --private-key=/aws/certs/tls.key
            - --trust-anchor-arn=arn:aws:rolesanywhere:us-east-1:793496711039:trust-anchor/9ecc96c8-4f38-43e3-8ba9-0fe3535c8ede
            - --profile-arn=arn:aws:rolesanywhere:us-east-1:793496711039:profile/ef2549c7-c86b-4dd2-afa6-ccc186c49f06
            - --role-arn=arn:aws:iam::793496711039:role/vault-unseal-runtime
            - --profile=default
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /aws/creds/credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: aws-ra-cert
              mountPath: /aws/certs
              readOnly: true
            - name: aws-creds
              mountPath: /aws/creds
        - name: aws-creds-bootstrap
          image: ghcr.io/nwarila-platform/ubi9-aws-signing-helper
          args:
            - update
            - --once
            - --region=us-east-1
            - --certificate=/aws/certs/tls.crt
            - --private-key=/aws/certs/tls.key
            - --trust-anchor-arn=arn:aws:rolesanywhere:us-east-1:793496711039:trust-anchor/9ecc96c8-4f38-43e3-8ba9-0fe3535c8ede
            - --profile-arn=arn:aws:rolesanywhere:us-east-1:793496711039:profile/ef2549c7-c86b-4dd2-afa6-ccc186c49f06
            - --role-arn=arn:aws:iam::793496711039:role/vault-unseal-runtime
            - --profile=default
          env:
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /aws/creds/credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: aws-ra-cert
              mountPath: /aws/certs
              readOnly: true
            - name: aws-creds
              mountPath: /aws/creds
      containers:
        - name: vault
          # Pinned to the SAME digest as the live Vault (verified from the
          # running deploy-vault/vault-0 pod 2026-06-23) so the drill Vault is
          # version-identical to live — required for the Part 2 snapshot restore
          # to be a faithful rehearsal.
          image: ghcr.io/nwarila-platform/ubi9-hashicorp-vault
          args:
            - server
            - -config=/vault/config/vault.hcl
          ports:
            - name: api
              containerPort: 8200
            - name: cluster
              containerPort: 8201
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: VAULT_RAFT_NODE_ID
              value: "$(HOSTNAME)"
            # All addresses reference ONLY the drill service. tls_disable on the
            # listener => http API addr; the cluster port keeps Vault's
            # auto-generated TLS (unused with zero peers).
            - name: VAULT_API_ADDR
              value: "http://$(HOSTNAME).vault-drill-internal.vault-drill.svc.cluster.local:8200"
            - name: VAULT_CLUSTER_ADDR
              value: "https://$(HOSTNAME).vault-drill-internal.vault-drill.svc.cluster.local:8201"
            - name: VAULT_ADDR
              value: "http://$(HOSTNAME).vault-drill-internal.vault-drill.svc.cluster.local:8200"
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /aws/creds/credentials
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /vault/data
            - name: config
              mountPath: /vault/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: aws-creds
              mountPath: /aws/creds
              readOnly: true
          startupProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200
              port: 8200
              scheme: HTTP
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200
              port: 8200
              scheme: HTTP
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&uninitcode=200&sealedcode=200&perfstandbyok=true
              port: 8200
              scheme: HTTP
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: vault-drill-config
            items:
              - key: vault-drill.hcl
                path: vault.hcl
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        # A COPY of the live Roles Anywhere workload cert, mounted read-only
        # ONLY into the signing-helper containers (never into Vault). Copied
        # into the vault-drill namespace at drill time by drill-run.sh — it is a
        # secret and is NEVER committed to git.
        - name: aws-ra-cert
          secret:
            secretName: vault-ra-cert
            defaultMode: 0400
        - name: aws-creds
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-vault
        resources:
          requests:
            storage: 2Gi
