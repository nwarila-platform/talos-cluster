# Child Flux Kustomization for namespace-scoped cert-manager resources.
#
# The parent cluster Kustomization creates the cert-manager Namespace first.
# This child then applies the HelmRepository, HelmRelease, and network policies
# into that Namespace, avoiding first-reconcile dry-run failures for
# namespace-scoped resources.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/talos-cluster/apps/cert-manager/release
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cert-manager
      namespace: cert-manager
