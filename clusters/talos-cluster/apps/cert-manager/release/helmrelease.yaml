apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: v1.21.0
      sourceRef:
        kind: HelmRepository
        name: cert-manager
      interval: 1h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
    remediation:
      remediateLastFailure: false
    cleanupOnFail: true
  values:
    crds:
      enabled: true
      keep: true
    image:
      repository: quay.io/jetstack/cert-manager-controller
      # renovate: datasource=docker depName=quay.io/jetstack/cert-manager-controller
      tag: "v1.21.0@sha256:e370f7800a53078e9d74324287a7d52b553864e55f5b4e521f911c3f6c7da203"
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
    webhook:
      image:
        repository: quay.io/jetstack/cert-manager-webhook
        # renovate: datasource=docker depName=quay.io/jetstack/cert-manager-webhook
        tag: "v1.21.0@sha256:c33cca307541e2d58861a55b1af5f390b7e19c8741e48b433693b73a7cce88b3"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
    cainjector:
      image:
        repository: quay.io/jetstack/cert-manager-cainjector
        # renovate: datasource=docker depName=quay.io/jetstack/cert-manager-cainjector
        tag: "v1.21.0@sha256:ad1dcc5b2fccc420f9b3fbee7ce8a869450c540fd4f2f41de2d95b1ca0c4d701"
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
    startupapicheck:
      image:
        repository: quay.io/jetstack/cert-manager-startupapicheck
        # renovate: datasource=docker depName=quay.io/jetstack/cert-manager-startupapicheck
        tag: "v1.21.0@sha256:68b3c5029dc63e64a6b6435337d7dc0eb169f889a48a02d999d1f22f31865b33"
      resources:
        requests:
          cpu: 5m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
    acmesolver:
      image:
        repository: quay.io/jetstack/cert-manager-acmesolver
        # renovate: datasource=docker depName=quay.io/jetstack/cert-manager-acmesolver
        tag: "v1.21.0@sha256:33ebbc2688578e37bd48dcc5b6b1f1362c919dff44fe5e5f602532a2d37d514f"
  test:
    enable: false
