# kustomization: the cluster must hold only the PUBLIC half of this key
# (encrypt-only). Applying the private half in-cluster would let anyone who
# compromises the cluster (or the shared Synology target plus the cluster)
# decrypt every archived etcd snapshot.
#
# What this is: the dedicated age identity that the dr-etcd-backup CronJob
# encrypts etcd snapshots TO (recipient
# age18scjc2mepug263cnqmkxe6drne6mqs5h77y9j3fh3fuxshxesuhsyh0vhx).
# Encrypted here with the repository SOPS age recipient, so decrypting this
# file requires the repo age key (in-cluster sops-age Secret /
# .s3/secrets/age.agekey / Stage-0). The RAW key is also escrowed at
# .s3/secrets/etcd-snapshot-age.agekey -> S3 Stage-0 (owner sync).
#
# Dead-cluster restore path:
#   1. Fetch this key: S3 Stage-0 copy, or `sops -d` this file with the
#      Stage-0 repo age key.
#   2. Pull the newest etcd-<stamp>.db.sops.json from the Synology Longhorn
#      backup (or the live PVC).
#   3. SOPS_AGE_KEY_FILE=<this key> sops -d --input-type json \
#        --output-type binary etcd-<stamp>.db.sops.json > etcd.db
#   4. talosctl bootstrap --recover-from=etcd.db (see the DR runbook).
